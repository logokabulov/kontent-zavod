<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0A0A0B"/>
<title>Kontent Zavod</title>
<link rel="manifest" href="/manifest.json"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
:root[data-theme="dark"]{--bg:#0A0A0A;--bg2:#0E0E0E;--sb:#111111;--sur:#161616;--sur2:#1C1C1C;--sur3:#242424;--sur4:#2E2E2E;--sep:#222222;--sep2:#2A2A2A;--tx:#FFFFFF;--tx2:#888888;--tx3:#555555;--pr:#BEF264;--prl:#D4FA8C;--prd:rgba(190,242,100,.12);--prtx:#0A0A0A;--te:#BEF264;--ted:rgba(190,242,100,.1);--gr:#BEF264;--grd:rgba(190,242,100,.1);--or:#FB923C;--ord:rgba(251,146,60,.12);--rd:#F87171;--rdd:rgba(248,113,113,.1);--bl:#60A5FA;--bld:rgba(96,165,250,.1);--sh:0 2px 16px rgba(0,0,0,.5);--sh2:0 8px 32px rgba(0,0,0,.7);--sh3:0 24px 64px rgba(0,0,0,.85)}
:root[data-theme="light"]{--bg:#F7F7F5;--bg2:#EFEFED;--sb:#FFFFFF;--sur:#FFFFFF;--sur2:#F2F2F0;--sur3:#E8E8E6;--sur4:#DCDCDA;--sep:#E4E4E2;--sep2:#D8D8D6;--tx:#0A0A0A;--tx2:#71716E;--tx3:#A3A3A0;--pr:#84CC16;--prl:#65A30D;--prd:rgba(132,204,22,.12);--prtx:#FFFFFF;--te:#65A30D;--ted:rgba(101,163,13,.1);--gr:#65A30D;--grd:rgba(101,163,13,.1);--or:#EA580C;--ord:rgba(234,88,12,.1);--rd:#DC2626;--rdd:rgba(220,38,38,.08);--bl:#2563EB;--bld:rgba(37,99,235,.08);--sh:0 1px 8px rgba(0,0,0,.06);--sh2:0 6px 24px rgba(0,0,0,.1);--sh3:0 20px 56px rgba(0,0,0,.14)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,'Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--sur4);border-radius:0}
::selection{background:var(--pr);color:var(--prtx)}
.app{display:flex;height:100vh;overflow:hidden}
/* ═══ ANIMATIONS ═══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes springIn{0%{opacity:0;transform:scale(.92) translateY(16px)}60%{transform:scale(1.01) translateY(-2px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes popIn{0%{opacity:0;transform:scale(.85)}70%{transform:scale(1.03)}100%{opacity:1;transform:scale(1)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 12px rgba(190,242,100,.25)}50%{box-shadow:0 0 28px rgba(190,242,100,.5)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes dotB{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}
@keyframes barGrow{from{width:0}
}
/* ═══ SIDEBAR ═══ */
.sb{width:220px;flex-shrink:0;background:var(--sb);border-right:1px solid var(--sep);display:flex;flex-direction:column;transition:left .3s cubic-bezier(.32,.72,0,1)}
.sb-top{padding:16px 12px;border-bottom:1px solid var(--sep)}
.logo{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:800;letter-spacing:.02em;text-transform:uppercase}
.logo-m{width:30px;height:30px;background:var(--pr);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;color:var(--prtx);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.logo:hover .logo-m{transform:rotate(-8deg) scale(1.08)}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;color:var(--tx3);padding:12px 14px 5px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 12px;margin:1px 6px;border-radius:4px;cursor:pointer;color:var(--tx2);font-size:12px;font-weight:600;transition:all .22s cubic-bezier(.32,.72,0,1);white-space:nowrap;overflow:hidden;border:none;background:none;width:calc(100% - 12px);text-align:left;font-family:inherit;text-transform:uppercase;letter-spacing:.03em;touch-action:manipulation;position:relative}
.ni::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%) scaleY(0);width:2px;height:60%;background:var(--pr);transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.ni:hover{background:var(--sur2);color:var(--tx);padding-left:15px}
.ni.on{background:var(--prd);color:var(--pr)}
.ni.on::before{transform:translateY(-50%) scaleY(1)}
.ni-ic{font-size:14px;flex-shrink:0;width:20px;text-align:center;transition:transform .25s}
.ni:hover .ni-ic{transform:scale(1.15)}
.ni-tx{flex:1;overflow:hidden;text-overflow:ellipsis}
.ni-cnt{background:var(--pr);color:var(--prtx);font-size:9px;font-weight:800;border-radius:3px;padding:1px 6px;transition:transform .2s}
.ni:hover .ni-cnt{transform:scale(1.1)}
.pdot{border-radius:0;display:inline-block;flex-shrink:0;transition:transform .25s}
.ni:hover .pdot{transform:rotate(45deg) scale(1.2)}
.sb-bot{padding:10px 6px;border-top:1px solid var(--sep)}
/* ═══ MAIN ═══ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:50px;background:var(--sb);border-bottom:1px solid var(--sep);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.tb-title{font-size:14px;font-weight:800;flex:1;text-transform:uppercase;letter-spacing:.04em}
.tb-r{display:flex;align-items:center;gap:6px}
.ic-btn{width:32px;height:32px;border-radius:4px;background:var(--sur);border:1px solid var(--sep2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--tx);transition:all .2s cubic-bezier(.32,.72,0,1);touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.ic-btn:hover{background:var(--sur3);border-color:var(--pr);transform:translateY(-1px)}
.ic-btn:active{transform:scale(.9)}
.sdot{width:7px;height:7px;border-radius:0;transition:background .3s}
.s-ok{background:var(--pr)}.s-err{background:var(--rd)}.s-ing{background:var(--or);animation:blink 1s infinite}
.content{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
.page-in{animation:fadeUp .35s cubic-bezier(.32,.72,0,1) both}
/* ═══ STATS ═══ */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.stat-card{background:var(--sur);border:1px solid var(--sep2);border-radius:4px;padding:15px 16px;cursor:pointer;transition:all .25s cubic-bezier(.32,.72,0,1);user-select:none;touch-action:manipulation;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--pr);transform:scaleX(0);transform-origin:left;transition:transform .3s cubic-bezier(.32,.72,0,1)}
.stat-card:hover{transform:translateY(-3px);box-shadow:var(--sh2);border-color:var(--sur4)}
.stat-card:hover::after{transform:scaleX(1)}
.stat-card:active{transform:translateY(-1px) scale(.98)}
.stat-n{font-size:30px;font-weight:800;letter-spacing:-.04em;line-height:1;transition:transform .25s}
.stat-card:hover .stat-n{transform:scale(1.06);display:inline-block}
.stat-l{font-size:10px;color:var(--tx2);margin-top:6px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
/* ═══ FILTERS ═══ */
.filter-row{display:flex;align-items:center;gap:7px;margin-bottom:18px;flex-wrap:wrap}
.fchip{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:4px;font-size:11px;font-weight:700;border:1px solid var(--sep2);background:var(--sur);color:var(--tx2);cursor:pointer;transition:all .2s cubic-bezier(.32,.72,0,1);font-family:inherit;text-transform:uppercase;letter-spacing:.04em;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.fchip:hover{background:var(--sur2);color:var(--tx);transform:translateY(-1px);border-color:var(--sur4)}
.fchip:active{transform:scale(.95)}
.fchip.on{background:var(--pr);border-color:var(--pr);color:var(--prtx)}
/* ═══ SEG ═══ */
.seg{display:flex;gap:0;background:var(--sur);border-radius:4px;padding:3px;border:1px solid var(--sep2)}
.seg-b{padding:6px 14px;font-size:11px;font-weight:700;font-family:inherit;border:none;border-radius:3px;cursor:pointer;transition:all .22s cubic-bezier(.32,.72,0,1);background:transparent;color:var(--tx2);white-space:nowrap;text-transform:uppercase;letter-spacing:.04em;touch-action:manipulation}
.seg-b:hover{color:var(--tx)}
.seg-b.on{background:var(--pr);color:var(--prtx)}
/* ═══ TASKS ═══ */
.task-list{display:flex;flex-direction:column;gap:7px}
.task-list .task-item:nth-child(1){animation:slideRight .3s .02s cubic-bezier(.32,.72,0,1) both}
.task-list .task-item:nth-child(2){animation:slideRight .3s .06s cubic-bezier(.32,.72,0,1) both}
.task-list .task-item:nth-child(3){animation:slideRight .3s .1s cubic-bezier(.32,.72,0,1) both}
.task-list .task-item:nth-child(4){animation:slideRight .3s .14s cubic-bezier(.32,.72,0,1) both}
.task-list .task-item:nth-child(5){animation:slideRight .3s .18s cubic-bezier(.32,.72,0,1) both}
.task-list .task-item:nth-child(n+6){animation:slideRight .3s .22s cubic-bezier(.32,.72,0,1) both}
.task-item{background:var(--sur);border:1px solid var(--sep2);border-radius:4px;padding:13px 15px;transition:all .25s cubic-bezier(.32,.72,0,1);cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;display:block;appearance:none;-webkit-appearance:none;width:100%;text-align:left;font-family:inherit;position:relative;overflow:hidden}
.task-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--pr);transform:scaleY(0);transition:transform .3s cubic-bezier(.32,.72,0,1)}
.task-item:hover{border-color:var(--sur4);transform:translateX(4px);box-shadow:var(--sh)}
.task-item:hover::before{transform:scaleY(1)}
.task-item:active{transform:translateX(2px) scale(.995)}
.task-item.corr{border-left:3px solid var(--or)}
.task-item.corr::before{display:none}
.task-item.done{opacity:.45}
.task-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.task-title{font-size:13px;font-weight:700;flex:1;color:var(--tx)}
.task-meta{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap;font-size:10px;color:var(--tx2);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.proj-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;background:var(--sur3);text-transform:uppercase;letter-spacing:.03em}
/* ═══ BADGE ═══ */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:800;padding:3px 9px;border-radius:3px;white-space:nowrap;text-transform:uppercase;letter-spacing:.06em;transition:transform .2s}
.badge:hover{transform:scale(1.05)}
.b-new{background:var(--sur3);color:var(--tx2)}
.b-progress{background:var(--bld);color:var(--bl)}
.b-submitted{background:var(--pr);color:var(--prtx)}
.b-corrections{background:var(--or);color:#0A0A0A}
.b-approved{background:var(--prd);color:var(--pr);border:1px solid var(--pr)}
.role-e{background:var(--bld);color:var(--bl)}.role-c{background:var(--grd);color:var(--gr)}.role-a{background:var(--ted);color:var(--te)}
/* ═══ DETAIL PANEL ═══ */
.dp{width:320px;flex-shrink:0;background:var(--sb);border-left:1px solid var(--sep);display:flex;flex-direction:column;overflow:hidden;animation:slideLeft .3s cubic-bezier(.32,.72,0,1) both}
.dp-top{padding:15px 16px;border-bottom:1px solid var(--sep);display:flex;align-items:center;justify-content:space-between;gap:8px}
.dp-body{padding:15px 16px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.dp-sec{margin-bottom:15px;animation:fadeUp .3s cubic-bezier(.32,.72,0,1) both}
.dp-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--tx3);margin-bottom:6px}
.dp-foot{padding:12px 16px;border-top:1px solid var(--sep);display:flex;flex-direction:column;gap:6px}
/* ═══ BUTTONS ═══ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;font-size:11px;font-weight:800;font-family:inherit;border-radius:4px;border:none;cursor:pointer;transition:all .2s cubic-bezier(.32,.72,0,1);white-space:nowrap;text-transform:uppercase;letter-spacing:.05em;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;position:relative;overflow:hidden}
.btn:active{transform:scale(.93)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-pr{background:var(--pr);color:var(--prtx)}
.btn-pr:hover{background:var(--prl);transform:translateY(-1px);box-shadow:0 4px 16px rgba(190,242,100,.35)}
.btn-gr{background:var(--pr);color:var(--prtx)}
.btn-gr:hover{background:var(--prl);transform:translateY(-1px);box-shadow:0 4px 16px rgba(190,242,100,.35)}
.btn-or{background:var(--or);color:#0A0A0A}
.btn-or:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 16px rgba(251,146,60,.3)}
.btn-rd{background:var(--rdd);color:var(--rd);border:1px solid rgba(248,113,113,.3)}
.btn-rd:hover{background:rgba(248,113,113,.18);transform:translateY(-1px)}
.btn-gh{background:transparent;color:var(--tx2);border:1px solid var(--sep2)}
.btn-gh:hover{background:var(--sur2);color:var(--tx);border-color:var(--sur4);transform:translateY(-1px)}
.btn-sm{padding:6px 12px;font-size:10px;border-radius:3px}
.btn-xs{padding:4px 9px;font-size:9px;border-radius:3px}
.btn-full{width:100%}
/* ═══ FORMS ═══ */
.fg{margin-bottom:13px}
.flbl{font-size:9px;color:var(--tx2);margin-bottom:6px;display:block;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
input[type=text],input[type=password],input[type=url],input[type=datetime-local],select,textarea{width:100%;background:var(--sur2);border:1px solid var(--sep2);border-radius:4px;color:var(--tx);padding:9px 12px;font-size:13px;font-family:inherit;outline:none;transition:all .22s cubic-bezier(.32,.72,0,1);-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--pr);box-shadow:0 0 0 3px var(--prd);transform:translateY(-1px)}
select option{background:var(--sur)}
textarea{min-height:76px;resize:vertical}
input[type=file]{display:block;width:100%;padding:11px;background:var(--sur2);border:1px dashed var(--sep2);border-radius:4px;color:var(--tx);cursor:pointer;font-size:12px;font-family:inherit;transition:all .22s}
input[type=file]:hover{border-color:var(--pr);background:var(--prd)}
.upload-zone{border:1px dashed var(--sep2);border-radius:4px;background:var(--sur2);padding:20px;text-align:center;transition:all .25s}
.upload-zone.drag{border-color:var(--pr);background:var(--prd);transform:scale(1.01)}
.prog-wrap{background:var(--sur3);border-radius:0;height:3px;overflow:hidden;margin-top:8px;display:none}
.prog-bar{height:100%;border-radius:0;width:0;background:var(--pr);transition:width .3s cubic-bezier(.32,.72,0,1)}
/* ═══ MODAL ═══ */
.overlay{position:fixed;inset:0;z-index:400;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);animation:fadeIn .25s both;-webkit-overflow-scrolling:touch;touch-action:manipulation;overflow-y:auto}
.modal{background:var(--sur);border:1px solid var(--sep2);border-radius:8px;padding:24px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:var(--sh3);animation:springIn .38s cubic-bezier(.34,1.4,.64,1) both;-webkit-overflow-scrolling:touch;position:relative}
.modal-lg{max-width:640px}
.modal-title{font-size:15px;font-weight:800;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;text-transform:uppercase;letter-spacing:.04em}
.modal-x{background:none;border:none;color:var(--tx2);cursor:pointer;font-size:18px;padding:6px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:all .2s}
.modal-x:hover{color:var(--tx);background:var(--sur3);transform:rotate(90deg)}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.sep-line{height:1px;background:var(--sep);margin:16px 0}
.err-msg{font-size:12px;color:var(--rd);margin-bottom:8px;font-weight:600;display:none}
/* ═══ COLORS ═══ */
.colors{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px}
.c-opt{width:24px;height:24px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:all .2s cubic-bezier(.34,1.56,.64,1)}
.c-opt.sel,.c-opt:hover{transform:scale(1.25) rotate(6deg);border-color:var(--tx)}
/* ═══ LINK ═══ */
.link-chip{display:inline-flex;align-items:center;gap:5px;background:var(--bld);border:1px solid rgba(96,165,250,.25);border-radius:3px;padding:4px 9px;font-size:11px;color:var(--bl);transition:transform .2s}
.link-chip:hover{transform:translateY(-1px)}
.link-chip span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.link-chip button{background:none;border:none;color:var(--bl);cursor:pointer;font-size:12px;opacity:.7;transition:opacity .15s}
.link-chip button:hover{opacity:1}
/* ═══ DEADLINE ═══ */
.dl-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;padding:3px 8px;border-radius:3px;background:var(--ord);color:var(--or);border:1px solid rgba(251,146,60,.3);text-transform:uppercase;letter-spacing:.03em}
.dl-badge.over{background:var(--rdd);color:var(--rd);border-color:rgba(248,113,113,.3);animation:blink 2s infinite}
/* ═══ AVATAR ═══ */
.uav{border-radius:4px;object-fit:cover;display:inline-flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.uav:hover{transform:scale(1.12) rotate(-3deg)}
/* ═══ SECTION ═══ */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.pg-title{font-size:22px;font-weight:800;letter-spacing:-.02em;text-transform:uppercase}
.pg-sub{font-size:12px;color:var(--tx2);margin-top:3px;font-weight:600}
.proj-sep{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--tx3);margin:20px 0 9px;display:flex;align-items:center;gap:8px}
.proj-sep::after{content:'';flex:1;height:1px;background:var(--sep)}
/* ═══ ANALYTICS ═══ */
.chart-card{background:var(--sur);border:1px solid var(--sep2);border-radius:4px;padding:18px;margin-bottom:12px;animation:fadeUp .35s cubic-bezier(.32,.72,0,1) both;transition:border-color .25s}
.chart-card:hover{border-color:var(--sur4)}
.chart-ttl{font-size:11px;font-weight:800;margin-bottom:14px;text-transform:uppercase;letter-spacing:.08em}
.an-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mbar-wrap{flex:1;background:var(--sur3);border-radius:0;height:6px;overflow:hidden}
.mbar{height:100%;border-radius:0;background:var(--pr);transition:width .9s cubic-bezier(.32,.72,0,1);animation:barGrow 1s cubic-bezier(.32,.72,0,1)}
/* ═══ TABLE ═══ */
.tbl-wrap{background:var(--sur);border:1px solid var(--sep2);border-radius:4px;overflow:hidden;margin-bottom:12px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--tx2);padding:10px 14px;text-align:left;border-bottom:1px solid var(--sep2);background:var(--sur2)}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--sep);font-size:13px;vertical-align:middle;transition:background .2s}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:var(--sur2)}
/* ═══ EMPTY ═══ */
.empty{text-align:center;padding:56px 24px;color:var(--tx2);animation:fadeUp .4s both}
.empty-ic{font-size:44px;margin-bottom:14px;display:block;animation:pulse 3s ease infinite}
.empty-ttl{font-size:14px;font-weight:800;color:var(--tx);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
/* ═══ LOGIN ═══ */
.login-wrap{height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px}
.login-card{background:var(--sur);border:1px solid var(--sep2);border-radius:8px;padding:32px 28px;width:100%;max-width:340px;box-shadow:var(--sh3);animation:springIn .5s cubic-bezier(.34,1.4,.64,1) both}
.login-ic{width:60px;height:60px;background:var(--pr);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 18px;animation:glowPulse 3s ease infinite;color:var(--prtx)}
/* ═══ LOADING ═══ */
.full-load{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.load-logo{width:64px;height:64px;background:var(--pr);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:30px;animation:glowPulse 2s ease infinite,pulse 2s ease infinite;color:var(--prtx)}
.load-dots{display:flex;gap:5px}
.load-dots span{width:5px;height:5px;border-radius:0;background:var(--pr);animation:dotB .9s ease infinite}
.load-dots span:nth-child(2){animation-delay:.15s}.load-dots span:nth-child(3){animation-delay:.3s}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,0,0,.25);border-top-color:currentColor;border-radius:50%;animation:spin .6s linear infinite}
code{background:var(--sur2);padding:2px 7px;border-radius:3px;font-size:11px;font-family:'SF Mono',Menlo,monospace;border:1px solid var(--sep)}
/* ═══ NOTICE ═══ */
.notice-ok{display:flex;align-items:center;gap:8px;background:var(--prd);border:1px solid var(--pr);border-radius:4px;padding:9px 13px;font-size:12px;font-weight:700;color:var(--pr);margin-bottom:12px;text-transform:uppercase;letter-spacing:.03em;animation:popIn .35s cubic-bezier(.34,1.4,.64,1) both}
.notice-warn{background:var(--ord);border:1px solid rgba(251,146,60,.35);border-radius:4px;padding:9px 13px;font-size:12px;font-weight:600;color:var(--or);margin-bottom:12px;display:flex;align-items:center;gap:8px;animation:popIn .35s both}
/* ═══ PRAVKA ═══ */
.prav-img{max-width:100%;border-radius:4px;margin-top:6px;cursor:pointer;transition:transform .25s,box-shadow .25s}
.prav-img:hover{transform:scale(1.02);box-shadow:var(--sh2)}
/* ═══ POWERED ═══ */
.powered{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--tx3);z-index:10;pointer-events:none;white-space:nowrap;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
/* ═══ PROFILE ═══ */
.big-av{width:64px;height:64px;border-radius:8px;object-fit:cover;border:2px solid var(--sep2);transition:all .3s cubic-bezier(.34,1.56,.64,1)}
.big-av:hover{transform:scale(1.05);border-color:var(--pr)}
.prof-pic-wrap{position:relative;display:inline-block}
.prof-pic-wrap input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;border-radius:8px;padding:0;border:none}
/* ═══ CHAT ═══ */
.chat-fab{position:fixed;bottom:24px;right:24px;z-index:500;width:54px;height:54px;border-radius:8px;background:var(--pr);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 24px rgba(190,242,100,.4);transition:all .3s cubic-bezier(.34,1.56,.64,1);color:var(--prtx);touch-action:manipulation}
.chat-fab:hover{transform:scale(1.12) rotate(-4deg);box-shadow:0 8px 32px rgba(190,242,100,.55)}
.chat-fab:active{transform:scale(.92)}
.chat-panel{position:fixed;bottom:90px;right:24px;z-index:499;width:340px;height:520px;background:var(--sur);border:1px solid var(--sep2);border-radius:8px;box-shadow:var(--sh3);display:flex;flex-direction:column;animation:springIn .4s cubic-bezier(.34,1.4,.64,1) both;overflow:hidden}
.chat-hdr{padding:13px 14px;border-bottom:1px solid var(--sep);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--sur2)}

.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch}
.msg{display:flex;gap:7px;align-items:flex-end;animation:fadeUp .3s cubic-bezier(.32,.72,0,1) both}
.msg.mine{flex-direction:row-reverse}
.msg-bubble{background:var(--sur2);border:1px solid var(--sep);border-radius:8px;border-bottom-left-radius:2px;padding:8px 11px;max-width:220px;font-size:13px;line-height:1.45;transition:transform .2s}
.msg-bubble:hover{transform:translateY(-1px)}
.msg.mine .msg-bubble{background:var(--pr);color:var(--prtx);border-radius:8px;border-bottom-right-radius:2px;border-color:transparent;font-weight:500}

.msg-time{font-size:9px;color:var(--tx3);flex-shrink:0;margin-bottom:2px;font-weight:600}

.msg-img:hover{transform:scale(1.03)}
.msg-audio{margin-top:4px;width:180px}
.chat-inp-bar{padding:10px 12px;border-top:1px solid var(--sep);display:flex;align-items:center;gap:7px;flex-shrink:0;background:var(--sur2)}
.chat-inp{flex:1;background:var(--sur3);border:1px solid var(--sep2);border-radius:4px;color:var(--tx);padding:8px 12px;font-size:13px;font-family:inherit;outline:none;transition:all .2s}
.chat-inp:focus{border-color:var(--pr);box-shadow:0 0 0 3px var(--prd)}
.chat-ic-btn{width:34px;height:34px;border-radius:4px;border:none;background:var(--sur3);color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s cubic-bezier(.32,.72,0,1);flex-shrink:0;touch-action:manipulation}
.chat-ic-btn:hover{background:var(--sur4);color:var(--tx);transform:translateY(-1px)}
.chat-ic-btn.rec{background:var(--rdd);color:var(--rd);animation:blink 1s infinite}
.send-btn{width:34px;height:34px;border-radius:4px;border:none;background:var(--pr);color:var(--prtx);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s cubic-bezier(.34,1.56,.64,1);flex-shrink:0;touch-action:manipulation}

.chat-day{text-align:center;font-size:9px;color:var(--tx3);margin:4px 0;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.sticker-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;padding:8px}
.sticker-btn{font-size:24px;border:none;background:none;cursor:pointer;border-radius:4px;padding:4px;transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.sticker-btn:hover{transform:scale(1.4) rotate(8deg);background:var(--sur2)}
.chat-people{flex:1;overflow-y:auto;padding:8px}
.chat-person{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:4px;cursor:pointer;transition:all .2s;touch-action:manipulation}
.chat-person:hover{background:var(--sur2);transform:translateX(3px)}
/* ═══ MOBILE ═══ */
@media(max-width:768px){
  .sb{position:fixed;left:-220px;top:0;bottom:0;z-index:300}

}

<body>
<div id="app"><div class="full-load"><div class="load-logo">🎬</div><div class="load-dots"><span></span><span></span><span></span></div></div></div>
<script>
// ══ SUPABASE ══
const SB_URL='https://baznohstrdvqgqvjmgki.supabase.co';
const SB_KEY='sb_publishable__55U9kl-dMOPIpIv57IaeA_xWksxaQL';
const BUCKET='kz-files',DATA_KEY='kz_data.json';
const sb=supabase.createClient(SB_URL,SB_KEY);

// ══ DEFAULTS ══
const DEF_USERS=[
  {id:'m1',name:'Sulton',username:'m1',pass:'1234',role:'editor',pic:null},
  {id:'m2',name:'Dior',username:'m2',pass:'1234',role:'editor',pic:null},
  {id:'m3',name:'Bunyod',username:'m3',pass:'1234',role:'editor',pic:null},
  {id:'t1',name:'Aziz',username:'t1',pass:'1234',role:'checker',pic:null},
  {id:'t2',name:'Jasur',username:'t2',pass:'1234',role:'checker',pic:null},
  {id:'a0',name:'Admin',username:'admin',pass:'admin1234',role:'admin',pic:null},
];
const DEF_PROJ=[{id:'p1',name:'Proyekt A',color:'#CC785C'},{id:'p2',name:'Proyekt B',color:'#2DD4BF'},{id:'p3',name:'Proyekt C',color:'#34C759'}];
const P_COLORS=['#BEF264','#FB923C','#60A5FA','#F87171','#A78BFA','#34D399','#FBBF24','#F472B6','#22D3EE','#E8B4B8'];
const ST={new:{l:'Yangi',c:'b-new'},in_progress:{l:'Jarayonda',c:'b-progress'},submitted:{l:'Tekshirishda',c:'b-submitted'},corrections:{l:'Pravkada',c:'b-corrections'},approved:{l:'Tasdiqlandi',c:'b-approved'}};
const ROLES={editor:'Montajer',checker:'Tekshiruvchi',admin:'Admin'};
const AVC={editor:'background:rgba(96,165,250,.15);color:#60A5FA',checker:'background:rgba(190,242,100,.15);color:#BEF264',admin:'background:rgba(251,146,60,.15);color:#FB923C'};

// ══ STATE ══
let cu=null,tasks=[],users=[],projects=[],
    activePage='tasks',activeP='all',activeSt='all',activeEd='all',
    activeStatCard=null,selectedTask=null,modalFn=null,
    noticeMsg='',syncSt='idle',isUploading=false,analyticsPeriod='month',
    chatOpen=false,chatWith=null,chatMessages=[],
    mediaRecorder=null,chatRecording=false,chatPollTimer=null,
    _selColor='#CC785C',_taskLinks=[];

// ══ CLOUD ══
async function cloudLoad(){
  syncSt='syncing';
  try{
    const url='https://baznohstrdvqgqvjmgki.supabase.co/storage/v1/object/public/kz-files/kz_data.json?t='+Date.now();
    const res=await fetch(url,{cache:'no-store'});
    if(res.status===200){
      const j=await res.json();
      users=(j.users||DEF_USERS).map(u=>({pic:null,...u}));
      projects=(j.projects||DEF_PROJ).map(p=>({color:'#CC785C',...p}));
      tasks=j.tasks||[];
    }else if(res.status===400||res.status===404){
      await cloudSave({users:DEF_USERS,projects:DEF_PROJ,tasks:[]},false);
      users=DEF_USERS;projects=DEF_PROJ;tasks=[];
    }else{
      throw new Error('HTTP '+res.status);
    }
    if(!users.find(u=>u.role==='admin'))users.push(DEF_USERS[5]);
    cacheLocal();syncSt='ok';
  }catch(e){
    console.warn('cloudLoad:',e.message||e);
    loadLocal();syncSt='err';
  }
}
async function cloudSave(ov,uc=true){
  const payload=ov||{users,projects,tasks};
  try{
    const bl=new Blob([JSON.stringify(payload)],{type:'application/json'});
    const{error}=await sb.storage.from(BUCKET).upload(DATA_KEY,bl,{upsert:true,contentType:'application/json'});
    if(error)throw error;syncSt='ok';
  }catch(e){console.warn(e);syncSt='err';}
  if(uc)cacheLocal();
}
function cacheLocal(){try{localStorage.setItem('kz_c',JSON.stringify({users,projects,tasks}));}catch{}}
function loadLocal(){
  try{
    const c=JSON.parse(localStorage.getItem('kz_c')||'null');
    if(c){users=(c.users||DEF_USERS).map(u=>({pic:null,...u}));projects=(c.projects||DEF_PROJ).map(p=>({color:'#CC785C',...p}));tasks=c.tasks||[];}
    else{users=DEF_USERS;projects=DEF_PROJ;tasks=[];}
    if(!users.find(u=>u.role==='admin'))users.push(DEF_USERS[5]);
  }catch{users=DEF_USERS;projects=DEF_PROJ;tasks=[];}
}

// ══ FILES ══
const fIcon=n=>{const e=(n||'').split('.').pop().toLowerCase();if(['mp4','mov','avi','mkv','webm'].includes(e))return'🎬';if(['mp3','wav','aac','m4a','ogg','webm'].includes(e))return'🎵';if(['jpg','jpeg','png','gif','webp'].includes(e))return'🖼️';return'📎';};
const isVid=n=>['mp4','mov','avi','mkv','webm'].includes((n||'').split('.').pop().toLowerCase());
const isAud=n=>['mp3','wav','aac','m4a','ogg','webm'].includes((n||'').split('.').pop().toLowerCase());
const fsize=b=>b>1048576?(b/1048576).toFixed(1)+' MB':(b/1024).toFixed(0)+' KB';
const gpUrl=p=>sb.storage.from(BUCKET).getPublicUrl(p).data.publicUrl;

async function uploadFile(file,pid){
  const safe=Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  const path='uploads/'+safe;
  const bar=pid?document.getElementById(pid+'-bar'):null;
  const wrap=pid?document.getElementById(pid):null;
  if(wrap)wrap.style.display='block';
  isUploading=true;let fp=0;
  const t=setInterval(()=>{fp=Math.min(fp+4,82);if(bar)bar.style.width=fp+'%';},180);
  try{
    const{error}=await sb.storage.from(BUCKET).upload(path,file,{upsert:true,contentType:file.type});
    clearInterval(t);isUploading=false;
    if(error)throw error;
    if(bar){bar.style.width='100%';setTimeout(()=>{if(wrap)wrap.style.display='none';bar.style.width='0%';},700);}
    return{path,url:gpUrl(path),name:file.name,size:file.size};
  }catch(e){
    clearInterval(t);isUploading=false;
    if(bar)bar.style.width='0%';if(wrap)wrap.style.display='none';
    throw e;
  }
}
async function delFile(p){if(!p)return;try{await sb.storage.from(BUCKET).remove([p]);}catch{}}

// ══ HELPERS ══
const $$=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fdate=ts=>new Date(ts).toLocaleDateString('ru',{day:'2-digit',month:'2-digit',year:'2-digit'});
const fdateL=ts=>new Date(ts).toLocaleDateString('ru',{day:'2-digit',month:'long'});
const initials=n=>(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const isDark=()=>document.documentElement.getAttribute('data-theme')==='dark';
const str=a=>JSON.stringify(a);
function badge(s){const x=ST[s]||ST.new;return`<span class="badge ${x.c}">${x.l}</span>`;}
function roleBadge(r){const c={editor:'role-e',checker:'role-c',admin:'role-a'}[r]||'';return`<span class="badge ${c}">${ROLES[r]||r}</span>`;}
const pColor=id=>projects.find(p=>p.id===id)?.color||'#CC785C';
const pName=id=>projects.find(p=>p.id===id)?.name||'—';
const uName=id=>users.find(u=>u.id===id)?.name||'—';

function avatarHTML(uid,size=20){
  const u=users.find(x=>x.id===uid);
  const s=`width:${size}px;height:${size}px;font-size:${Math.floor(size*.38)}px;border-radius:50%`;
  if(u?.pic)return`<img src="${esc(u.pic)}" class="uav" style="${s}" onerror="this.style.display='none'"/>`;
  return`<div class="uav" style="${s};${AVC[u?.role||'editor']};display:flex;align-items:center;justify-content:center;font-weight:700">${initials(u?.name||'')}</div>`;
}

function dlBadge(ts){
  if(!ts)return'';
  const diff=ts-Date.now();
  const d=new Date(ts);
  const str2=d.toLocaleDateString('ru',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  return`<span class="dl-badge ${diff<0?'over':''}">${diff<0?'⚠️':'⏰'} ${str2}</span>`;
}

function mediaHTML(url,name){
  if(!url)return'';
  if(isVid(name))return`<div style="margin-top:8px;border-radius:8px;overflow:hidden;background:#000"><video controls preload="metadata" src="${esc(url)}" style="width:100%;max-height:200px;display:block"></video></div>`;
  if(isAud(name))return`<div style="margin-top:8px"><audio controls src="${esc(url)}" style="width:100%"></audio></div>`;
  return`<a href="${esc(url)}" target="_blank" style="display:inline-flex;align-items:center;gap:5px;margin-top:6px;font-size:12px;color:var(--bl)">${fIcon(name)} ${esc(name||'Fayl')}</a>`;

function emptyS(t,s){return`<div class="empty"><span class="empty-ic">📋</span><div class="empty-ttl">${t}</div><div>${s}</div></div>`;}

function renderLinks(){return _taskLinks.map((l,i)=>`<div class="link-chip"><span>${esc(l.length>35?l.slice(0,35)+'...':l)}</span><button onclick="removeLink(${i})">✕</button></div>`).join('');}
function addLink(){const inp=$$('m-link-inp');const v=inp?.value.trim();if(!v)return;if(!v.startsWith('http')){alert('https:// bilan boshlansin');return;}_taskLinks.push(v);if(inp)inp.value='';const w=$$('links-wrap');if(w)w.innerHTML=renderLinks();}
function removeLink(i){_taskLinks.splice(i,1);const w=$$('links-wrap');if(w)w.innerHTML=renderLinks();}

// ══ RENDER ══
function render(){
  const app=$$('app');if(!app)return;
  if(!cu){app.innerHTML=loginHTML();return;}
  app.innerHTML=shellHTML();
}
function showNotice(m){noticeMsg=m;render();setTimeout(()=>{if(noticeMsg===m){noticeMsg='';if(cu)render();}},3000);}
function closeModal(){modalFn=null;render();}
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&modalFn)closeModal();});

// ══ LOGIN ══
function loginHTML(){
  return`<div class="login-wrap"><div class="login-card">
    <div class="login-ic">🎬</div>
    <div style="font-size:20px;font-weight:700;text-align:center;letter-spacing:-.04em;margin-bottom:4px">Kontent Zavod</div>
    <div style="font-size:13px;color:var(--tx2);text-align:center;margin-bottom:24px">Montaj boshqaruv tizimi</div>
    ${syncSt==='err'?'<div class="notice-warn" style="margin-bottom:14px;font-size:12px">⚠️ Server bilan aloqa yo\'q</div>':''}
    <div class="fg"><label class="flbl">Login</label><input type="text" id="un" placeholder="loginni kiriting" autocomplete="username"/></div>
    <div class="fg"><label class="flbl">Parol</label><input type="password" id="pw" placeholder="••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/></div>

    <div style="text-align:center;margin-top:14px"><button class="btn btn-gh btn-sm" onclick="toggleTheme()">${isDark()?'☀️ Yorug\'':'🌙 Qorong\'u'} rejim</button></div>
  </div></div>`;
}
function doLogin(){
  const un=$$('un')?.value.trim(),pw=$$('pw')?.value;
  const u=users.find(x=>x.username===un&&x.pass===pw);
  if(!u){const e=$$('lerr');if(e)e.style.display='block';return;}
  cu=u;localStorage.setItem('kz_s',cu.id);render();

// ══ SHELL ══
function shellHTML(){
  const allMine=cu.role==='editor'?tasks.filter(t=>t.assignedTo===cu.id):tasks;
  const pendingCheck=tasks.filter(t=>t.status==='submitted').length;
  const navItems=cu.role==='editor'?[
    {id:'tasks',icon:'📋',label:'Topshiriqlarim',cnt:allMine.filter(t=>t.status!=='approved').length||null},

    ...(cu.role==='admin'?[{id:'admin',icon:'⚙️',label:'Admin'}]:[]),

    const cnt=cu.role==='editor'?tasks.filter(t=>t.projectId===p.id&&t.assignedTo===cu.id).length:tasks.filter(t=>t.projectId===p.id).length;
    return`<button class="ni ${activeP===p.id&&activePage==='tasks'?'on':''}" onclick="setP('${p.id}')">
      <span class="pdot" style="background:${p.color};width:8px;height:8px"></span>
      <span class="ni-tx">${esc(p.name)}</span>
      ${cnt?`<span class="ni-cnt">${cnt}</span>`:''}
    </button>`;
  }).join('');
  return`<div class="app">
  <div class="sb">
    <div class="sb-top"><div class="logo"><div class="logo-m">🎬</div><span>Kontent Zavod</span></div></div>

// ══ TASKS PAGE ══
function tasksPageHTML(){
  let vis=cu.role==='editor'?tasks.filter(t=>t.assignedTo===cu.id):tasks;
  const total=vis.length,checkN=vis.filter(t=>t.status==='submitted').length,corrN=vis.filter(t=>t.status==='corrections').length,doneN=vis.filter(t=>t.status==='approved').length;
  if(activeP!=='all')vis=vis.filter(t=>t.projectId===activeP);
  if(activeSt!=='all')vis=vis.filter(t=>t.status===activeSt);
  if(activeEd!=='all'&&cu.role!=='editor')vis=vis.filter(t=>t.assignedTo===activeEd);
  if(activeStatCard==='check')vis=vis.filter(t=>t.status==='submitted');
  else if(activeStatCard==='corr')vis=vis.filter(t=>t.status==='corrections');
  else if(activeStatCard==='done')vis=vis.filter(t=>t.status==='approved');
  const edSel=cu.role!=='editor'?`<select onchange="activeEd=this.value;render()" style="height:28px;padding:0 8px;font-size:12px;border-radius:6px;background:var(--sur2);border:.5px solid var(--sep2);color:var(--tx)">
    <option value="all">Barcha montajerlar</option>
    ${users.filter(u=>u.role==='editor').map(u=>`<option value="${u.id}" ${activeEd===u.id?'selected':''}>${esc(u.name)}</option>`).join('')}
  </select>`:'';
  const blocks=projects.map(p=>{
    const pt=vis.filter(t=>t.projectId===p.id);
    if(!pt.length)return'';
    return`<div class="proj-sep"><span class="pdot" style="background:${p.color};width:8px;height:8px"></span>${esc(p.name)}<span style="color:var(--tx3);font-size:10px">${pt.length} ta</span></div>
    <div class="task-list">${pt.map(taskItemHTML).join('')}</div>`;
  }).join('');
  return`
  <div class="stats-row">
    <div class="stat-card ${activeStatCard===null?'':''}  " onclick="toggleSC(null)" style="${activeStatCard===null?'border-color:var(--tx2)':''}">
      <div class="stat-n">${total}</div><div class="stat-l">Jami</div>
    </div>
    <div class="stat-card" onclick="toggleSC('check')" style="${activeStatCard==='check'?'border-color:var(--gr);color:var(--gr)':''}">
      <div class="stat-n" style="color:var(--gr)">${checkN}</div><div class="stat-l">Tekshirishda</div>
    </div>
    <div class="stat-card" onclick="toggleSC('corr')" style="${activeStatCard==='corr'?'border-color:var(--or);color:var(--or)':''}">
      <div class="stat-n" style="color:var(--or)">${corrN}</div><div class="stat-l">Pravkada</div>
    </div>
    <div class="stat-card" onclick="toggleSC('done')" style="${activeStatCard==='done'?'border-color:var(--pr);color:var(--pr)':''}">
      <div class="stat-n" style="color:var(--pr)">${doneN}</div><div class="stat-l">Tasdiqlandi</div>
    </div>
  </div>
  <div class="filter-row">
    ${[{k:'all',l:'Barchasi'},{k:'new',l:'Yangi'},{k:'in_progress',l:'Jarayonda'},{k:'submitted',l:'Tekshirishda'},{k:'corrections',l:'Pravkada'},{k:'approved',l:'Tayyor'}].map(f=>`<button class="fchip ${activeSt===f.k&&!activeStatCard?'on':''}" onclick="activeSt='${f.k}';activeStatCard=null;render()">${f.l}</button>`).join('')}
    <div style="margin-left:auto">${edSel}</div>
  </div>
  ${activeStatCard?`<div style="background:var(--prd);border:.5px solid rgba(204,120,92,.25);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--pr);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between">
    <span>🔍 Filtr: ${activeStatCard==='check'?'Tekshirishda':activeStatCard==='corr'?'Pravkada':'Tasdiqlandi'} (${vis.length} ta)</span>
    <button class="btn btn-gh btn-xs" onclick="activeStatCard=null;render()">✕ Tozalash</button>
  </div>`:''}
  ${vis.length===0?emptyS('Topshiriqlar yo\'q','Yangi topshiriq uchun + tugmasini bosing'):blocks}`;
}

function pfAdd(input){

function pfRemove(i){

async function submitWork(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const files=Array.from(window._pFiles||[]);
  if(!files.length&&!t.subUrl){alert('Iltimos kamida bitta fayl qo\'shing');return;}
  const btn=document.getElementById('sub-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Yuklanmoqda...';}
  if(files.length){
    if(t.subPath)await delFile(t.subPath);
    for(const sf of(t.subFiles||[]))await delFile(sf.path);
    t.subFiles=[];t.subUrl=null;t.subName=null;t.subPath=null;
    for(let i=0;i<files.length;i++){
      if(btn)btn.innerHTML=`<span class="spinner"></span> ${i+1}/${files.length} yuklanmoqda...`;
      try{
        const r=await uploadFile(files[i],'s-prog');
        t.subFiles.push({url:r.url,name:r.name,path:r.path});
        if(i===0){t.subUrl=r.url;t.subName=r.name;t.subPath=r.path;}
      }catch(e){
        const er=document.getElementById('s-err');
        if(er){er.style.display='block';er.textContent='Xatolik: '+e.message;}
        if(btn){btn.disabled=false;btn.textContent='Yuborish';}return;
      }
    }
  }
  window._pFiles=[];
  t.status='submitted';
  await cloudSave();modalFn=null;showNotice('Video tekshirishga yuborildi ✓');
}

// ══ ANALYTICS ══
function analyticsPageHTML(){
  const TZ=5*3600*1000,now=Date.now();
  const todayS=Math.floor((now+TZ)/86400000)*86400000-TZ;
  const weekS=todayS-6*86400000,monthS=todayS-29*86400000;
  const pS=analyticsPeriod==='day'?todayS:analyticsPeriod==='week'?weekS:analyticsPeriod==='month'?monthS:0;
  const pL=analyticsPeriod==='day'?'Bugun':analyticsPeriod==='week'?'Bu hafta':analyticsPeriod==='month'?'Bu oy':'Barchasi';
  const apAll=tasks.filter(t=>t.status==='approved');
  const apP=apAll.filter(t=>t.createdAt>=pS);
  const editors=users.filter(u=>u.role==='editor');
  const maxBar=Math.max(1,...editors.map(e=>tasks.filter(t=>t.assignedTo===e.id&&t.status==='approved'&&t.createdAt>=pS).length));
  const edRows=editors.map(e=>{
    const done=tasks.filter(t=>t.assignedTo===e.id&&t.status==='approved'&&t.createdAt>=pS).length;
    const total=tasks.filter(t=>t.assignedTo===e.id&&t.createdAt>=pS).length;
    const active=tasks.filter(t=>t.assignedTo===e.id&&['new','in_progress','corrections'].includes(t.status)).length;
    const todayDone=tasks.filter(t=>t.assignedTo===e.id&&t.status==='approved'&&t.createdAt>=todayS).length;
    const todaySub=tasks.filter(t=>t.assignedTo===e.id&&t.status==='submitted'&&t.createdAt>=todayS).length;
    const isG=todayDone>0||todaySub>0,isR=!isG&&active>0;
    const sc=isG?'var(--gr)':isR?'var(--rd)':'var(--tx2)';
    const sb2=isG?'var(--grd)':isR?'var(--rdd)':'var(--sur3)';
    const si=isG?'✓':isR?'!':'—';
    const bp=maxBar>0?Math.round(done/maxBar*100):0;
    return`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid var(--sep)">
      <div style="display:flex;align-items:center;gap:10px;width:140px;flex-shrink:0">${avatarHTML(e.id,30)}<div><div style="font-size:13px;font-weight:600">${esc(e.name)}</div><div style="font-size:11px;color:var(--tx2)">${done} tayyor</div></div></div>
      <div style="flex:1"><div class="mbar-wrap"><div class="mbar" style="width:${bp}%"></div></div><div style="font-size:11px;color:var(--tx2);margin-top:3px">Jami: ${total} · Tayyor: ${done} · Jarayonda: ${active}</div></div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0"><div style="font-size:18px;font-weight:700;color:${sc}">${done}</div><div style="width:26px;height:26px;border-radius:50%;background:${sb2};color:${sc};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700">${si}</div></div>
    </div>`;
  }).join('');
  const days=[],dL=[];
  for(let i=6;i>=0;i--){const ds=todayS-i*86400000;const de=ds+86400000;days.push(tasks.filter(t=>t.status==='approved'&&t.createdAt>=ds&&t.createdAt<de).length);const d=new Date(ds+TZ);dL.push(d.toLocaleDateString('ru',{day:'2-digit',month:'2-digit'}));}

// ══ CHAT ══
async function loadChat(){
  if(!cu||!chatWith)return;
  try{
    const{data,error}=await sb.from('messages').select('*')
      .or(`and(from_id.eq.${cu.id},to_id.eq.${chatWith}),and(from_id.eq.${chatWith},to_id.eq.${cu.id})`)
      .order('created_at',{ascending:true}).limit(300);
    if(error)throw error;
    chatMessages=(data||[]).map(r=>({id:r.id,from:r.from_id,to:r.to_id,text:r.text||'',type:r.type||'text',fileUrl:r.file_url,fileName:r.file_name,ts:new Date(r.created_at).getTime()}));
  }catch(e){console.warn(e);}
}
async function sendMsg(text,fileUrl,fileName,type){
  if(!cu||!chatWith)return;
  try{await sb.from('messages').insert({from_id:cu.id,to_id:chatWith,text:text||'',type:type||'text',file_url:fileUrl||null,file_name:fileName||null});}
  catch(e){console.warn(e);}
}
function toggleChat(){
  chatOpen=!chatOpen;
  if(!chatOpen){const cp=document.querySelector('.chat-panel');if(cp)cp.remove();chatWith=null;stopChatPoll();}
  else renderChatFab();
  renderChatFab();
}
function startChatPoll(){
  if(chatPollTimer)return;
  chatPollTimer=setInterval(async()=>{
    if(!chatOpen||!chatWith)return;
    const prev=chatMessages.length;
    await loadChat();
    if(chatMessages.length>prev){const c=document.querySelector('.chat-msgs');if(c){c.innerHTML=buildMsgs();c.scrollTop=c.scrollHeight;}}
  },3000);
}
function stopChatPoll(){if(chatPollTimer){clearInterval(chatPollTimer);chatPollTimer=null;}}
function openChatWith(uid){chatWith=uid;chatMessages=[];loadChat().then(()=>{renderChatPanel();startChatPoll();});}
function backToList(){chatWith=null;chatMessages=[];stopChatPoll();renderChatPanel();}
function renderChatFab(){
  let fab=document.querySelector('.chat-fab');
  if(!fab){fab=document.createElement('button');fab.className='chat-fab';fab.onclick=toggleChat;document.body.appendChild(fab);}
  fab.innerHTML='💬';
  if(!chatOpen){const cp=document.querySelector('.chat-panel');if(cp)cp.remove();return;}
  renderChatPanel();
}
function renderChatPanel(){
  let cp=document.querySelector('.chat-panel');
  if(!cp){cp=document.createElement('div');cp.className='chat-panel';document.body.appendChild(cp);}
  if(!chatWith){
    const people=users.filter(u=>u.id!==cu.id);
    cp.innerHTML=`<div class="chat-hdr"><span style="font-size:18px">💬</span><div class="chat-ttl">Xabarlar</div><button class="ic-btn" onclick="toggleChat()" style="width:26px;height:26px">✕</button></div>
    <div class="chat-people">${people.map(p=>`<div class="chat-person" onclick="openChatWith('${p.id}')">${avatarHTML(p.id,32)}<div style="flex:1"><div style="font-size:13px;font-weight:500">${esc(p.name)}</div><div style="font-size:11px;color:var(--tx2)">${ROLES[p.role]||p.role}</div></div><span style="color:var(--tx3);font-size:14px">›</span></div>`).join('')}</div>`;
    return;
  }
  const other=users.find(u=>u.id===chatWith);
  cp.innerHTML=`<div class="chat-hdr"><button class="chat-ic-btn" onclick="backToList()" style="font-size:18px">←</button>${avatarHTML(chatWith,26)}<div class="chat-ttl">${esc(other?.name||'Chat')}</div><button class="ic-btn" onclick="toggleChat()" style="width:26px;height:26px">✕</button></div>
  <div class="chat-msgs" id="chat-msgs">${buildMsgs()}</div>
  <div id="sticker-tray" style="display:none;border-top:.5px solid var(--sep);overflow-x:auto"><div class="sticker-grid">${['😀','😂','🔥','❤️','👍','✅','🎬','🎵','⚡','🌟','💯','🎉','😎','🤔','💪','👏','🙏','😅','🤩','😤'].map(s=>`<button class="sticker-btn" onclick="sendSticker('${s}')">${s}</button>`).join('')}</div></div>
  <div class="chat-inp-bar">
    <button class="chat-ic-btn" onclick="toggleStickers()">😊</button>
    <label style="cursor:pointer"><input type="file" id="chat-img" accept="image/*" style="display:none" onchange="sendChatImg()"/><div class="chat-ic-btn">🖼️</div></label>
    <button class="chat-ic-btn ${chatRecording?'rec':''}" id="rec-btn" onclick="toggleRec()">🎙️</button>
    <input class="chat-inp" id="chat-inp" placeholder="Xabar yozing..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendTxt()}"/>
    <button class="send-btn" onclick="sendTxt()">▶</button>
  </div>`;
  const msgs=cp.querySelector('#chat-msgs');if(msgs)msgs.scrollTop=msgs.scrollHeight;
}
function buildMsgs(){
  let html='';let lastDay='';
  chatMessages.forEach(m=>{
    const d=new Date(m.ts).toLocaleDateString('ru',{day:'2-digit',month:'2-digit'});
    if(d!==lastDay){html+=`<div class="chat-day">${d}</div>`;lastDay=d;}
    const mine=m.from===cu?.id;
    const u=users.find(x=>x.id===m.from);
    const time=new Date(m.ts).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
    let content='';
    if(m.type==='text')content=`<div>${esc(m.text)}</div>`;
    else if(m.type==='image')content=`<img src="${esc(m.fileUrl)}" class="msg-img" onclick="window.open('${esc(m.fileUrl)}')"/>`;
    else if(m.type==='audio')content=`<audio controls class="msg-audio" src="${esc(m.fileUrl)}"></audio>`;
    else if(m.type==='sticker')content=`<div style="font-size:40px">${m.text}</div>`;
    html+=`<div class="msg ${mine?'mine':''}">
      ${!mine?avatarHTML(m.from,24):''}
      <div><div class="msg-name">${mine?'Men':esc(u?.name||'?')}</div><div class="msg-bubble">${content}</div></div>
      <div class="msg-time">${time}</div>
    </div>`;
  });
  return html;
}
function toggleStickers(){const t=$$('sticker-tray');if(t)t.style.display=t.style.display==='none'?'block':'none';}
async function sendSticker(s){await sendMsg(s,null,null,'sticker');chatMessages.push({id:'loc'+Date.now(),from:cu.id,text:s,type:'sticker',ts:Date.now()});renderChatPanel();}
async function sendTxt(){const inp=$$('chat-inp');const txt=inp?.value.trim();if(!txt)return;inp.value='';const m={id:'loc'+Date.now(),from:cu.id,text:txt,type:'text',ts:Date.now()};chatMessages.push(m);renderChatPanel();await sendMsg(txt,null,null,'text');}
async function sendChatImg(){const file=$$('chat-img')?.files?.[0];if(!file)return;try{const r=await uploadFile(file,null);await sendMsg('',r.url,r.name,'image');chatMessages.push({id:'loc'+Date.now(),from:cu.id,text:'',type:'image',fileUrl:r.url,fileName:r.name,ts:Date.now()});renderChatPanel();}catch(e){alert('Xatolik: '+e.message);}}
async function deleteMsg(id){if(!confirm('Xabarni o\'chirishni tasdiqlaysizmi?'))return;try{await sb.from('messages').delete().eq('id',id);}catch{}chatMessages=chatMessages.filter(m=>m.id!==id);renderChatPanel();}
async function toggleRec(){
  if(chatRecording){if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();chatRecording=false;const b=$$('rec-btn');if(b)b.classList.remove('rec');return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const chunks=[];mediaRecorder=new MediaRecorder(stream);
    mediaRecorder.ondataavailable=e=>chunks.push(e.data);
    mediaRecorder.onstop=async()=>{
      const blob=new Blob(chunks,{type:'audio/webm'});
      const file=new File([blob],'voice_'+Date.now()+'.webm',{type:'audio/webm'});
      stream.getTracks().forEach(t=>t.stop());
      try{const r=await uploadFile(file,null);await sendMsg('',r.url,r.name,'audio');chatMessages.push({id:'loc'+Date.now(),from:cu.id,text:'',type:'audio',fileUrl:r.url,ts:Date.now()});renderChatPanel();}catch{}
      chatRecording=false;const b=$$('rec-btn');if(b)b.classList.remove('rec');
    };
    mediaRecorder.start();chatRecording=true;const b=$$('rec-btn');if(b)b.classList.add('rec');
  }catch{alert('Mikrofon ruxsati berilmadi');}
}

// ══ INIT ══
async function autoMoveOverdue(){
  const TZ=5*3600*1000,now=Date.now();
  const todayS=Math.floor((now+TZ)/86400000)*86400000-TZ;
  let changed=false;
  tasks.forEach(t=>{
    if(t.deadline&&t.deadline<todayS&&!['approved','submitted'].includes(t.status)){
      const dayTime=t.deadline%86400000;t.deadline=todayS+86400000+(dayTime>0?dayTime:0);changed=true;
    }
  });
  if(changed)await cloudSave();
}

async function init(){
  const th=localStorage.getItem('kz_th')||'dark';
  document.documentElement.setAttribute('data-theme',th);
  await cloudLoad();
  await autoMoveOverdue();
  const sid=localStorage.getItem('kz_s');
  if(sid)cu=users.find(u=>u.id===sid)||null;
  render();
  setTimeout(renderChatFab,300);
  setInterval(async()=>{
    if(modalFn||isUploading)return;
    const pT=JSON.stringify(tasks),pU=JSON.stringify(users.map(u=>u.id+u.name+u.role));
    await cloudLoad();
    const nT=JSON.stringify(tasks),nU=JSON.stringify(users.map(u=>u.id+u.name+u.role));
    if(pT!==nT||pU!==nU){
      if(cu&&!modalFn){
        const f=users.find(u=>u.id===cu.id);if(f)cu=f;
        // Don't re-render if mobile detail is open
        if(!document.getElementById('mobile-detail'))render();
      }
    }else{const dot=document.querySelector('.sdot');if(dot)dot.className='sdot s-ok';}
  },5000);
}
init();
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
(function(){const el=document.createElement('div');el.className='powered';el.textContent='Powered by creatandcook';document.body.appendChild(el);})();
</script>
