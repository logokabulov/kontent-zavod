<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0A0A0B"/>
<title>Kontent Zavod</title>
<link rel="manifest" href="/manifest.json"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
:root[data-theme="dark"]{--bg:#0A0A0B;--bg2:#111113;--sb:#111113;--sur:#1A1A1D;--sur2:#222226;--sur3:#2A2A2F;--sur4:#333338;--sep:rgba(255,255,255,.07);--sep2:rgba(255,255,255,.12);--tx:#F5F5F7;--tx2:rgba(245,245,247,.55);--tx3:rgba(245,245,247,.28);--pr:#CC785C;--prl:#D4896B;--prd:rgba(204,120,92,.15);--te:#2DD4BF;--ted:rgba(45,212,191,.13);--gr:#34C759;--grd:rgba(52,199,89,.12);--or:#FF9500;--ord:rgba(255,149,0,.12);--rd:#FF453A;--rdd:rgba(255,69,58,.12);--bl:#0A84FF;--bld:rgba(10,132,255,.12);--sh:0 2px 12px rgba(0,0,0,.4);--sh2:0 8px 32px rgba(0,0,0,.6);--sh3:0 20px 60px rgba(0,0,0,.8)}
:root[data-theme="light"]{--bg:#F2F2F7;--bg2:#E5E5EA;--sb:#fff;--sur:#fff;--sur2:#F2F2F7;--sur3:#E5E5EA;--sur4:#D1D1D6;--sep:rgba(0,0,0,.08);--sep2:rgba(0,0,0,.14);--tx:#1A1A1E;--tx2:rgba(26,26,30,.55);--tx3:rgba(26,26,30,.28);--pr:#CC785C;--prl:#B86A4E;--prd:rgba(204,120,92,.12);--te:#0D9488;--ted:rgba(13,148,136,.1);--gr:#34C759;--grd:rgba(52,199,89,.1);--or:#FF9500;--ord:rgba(255,149,0,.1);--rd:#FF3B30;--rdd:rgba(255,59,48,.08);--bl:#007AFF;--bld:rgba(0,122,255,.1);--sh:0 1px 6px rgba(0,0,0,.07);--sh2:0 4px 20px rgba(0,0,0,.09);--sh3:0 16px 48px rgba(0,0,0,.12)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,'Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
@supports (-webkit-touch-callout:none){.content{-webkit-overflow-scrolling:touch}.chat-msgs{-webkit-overflow-scrolling:touch}}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--sur4);border-radius:2px}
.app{display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
.sb{width:220px;flex-shrink:0;background:rgba(17,17,19,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-right:.5px solid var(--sep);display:flex;flex-direction:column}
.sb-top{padding:14px 12px;border-bottom:.5px solid var(--sep)}
.logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700}
.logo-m{width:28px;height:28px;background:linear-gradient(135deg,var(--pr),var(--te));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0}
.nav-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);padding:8px 14px 4px}
.ni{display:flex;align-items:center;gap:8px;padding:7px 12px;margin:1px 6px;border-radius:8px;cursor:pointer;color:var(--tx2);font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap;overflow:hidden;border:none;background:none;width:calc(100% - 12px);text-align:left;font-family:inherit;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.ni:hover{background:var(--sur2);color:var(--tx)}.ni.on{background:var(--prd);color:var(--pr)}
.ni-ic{font-size:15px;flex-shrink:0;width:20px;text-align:center}
.ni-tx{flex:1;overflow:hidden;text-overflow:ellipsis}
.ni-cnt{background:var(--pr);color:#fff;font-size:10px;font-weight:700;border-radius:8px;padding:1px 6px}
.pdot{border-radius:50%;display:inline-block;flex-shrink:0}
.sb-bot{padding:10px 6px;border-top:.5px solid var(--sep)}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
/* TOPBAR */
.topbar{height:48px;background:rgba(17,17,19,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:.5px solid var(--sep);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.tb-title{font-size:15px;font-weight:700;flex:1}
.tb-r{display:flex;align-items:center;gap:6px}
.ic-btn{width:30px;height:30px;border-radius:7px;background:var(--sur2);border:.5px solid var(--sep2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--tx);transition:all .15s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.ic-btn:hover{background:var(--sur3)}.ic-btn:active{transform:scale(.92)}
.sdot{width:6px;height:6px;border-radius:50%}.s-ok{background:var(--gr)}.s-err{background:var(--rd)}.s-ing{background:var(--or);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
/* CONTENT */
.content{flex:1;overflow-y:auto;padding:20px}
.page-in{animation:fadeUp .25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes springIn{from{opacity:0;transform:scale(.94) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:rgba(28,28,32,.8);backdrop-filter:blur(12px);border:.5px solid var(--sep2);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .2s;user-select:none;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.stat-card.act{border-color:currentColor;box-shadow:0 0 0 1px currentColor}
.stat-n{font-size:28px;font-weight:700;letter-spacing:-.04em;line-height:1}
.stat-l{font-size:12px;color:var(--tx2);margin-top:5px;font-weight:500}
/* FILTERS */
.filter-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.fchip{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:20px;font-size:12px;font-weight:500;border:.5px solid var(--sep);background:var(--sur);color:var(--tx2);cursor:pointer;transition:all .15s;font-family:inherit;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.fchip:hover{background:var(--sur2);color:var(--tx)}.fchip.on{background:var(--prd);border-color:rgba(204,120,92,.35);color:var(--pr);font-weight:600}
/* SEG BTNS */
.seg{display:flex;gap:0;background:var(--sur2);border-radius:10px;padding:3px;border:.5px solid var(--sep2)}
.seg-b{padding:6px 14px;font-size:12px;font-weight:500;font-family:inherit;border:none;border-radius:7px;cursor:pointer;transition:all .18s;background:transparent;color:var(--tx2);white-space:nowrap}
.seg-b.on{background:var(--pr);color:#fff;font-weight:600}
/* TASKS */
.task-list{display:flex;flex-direction:column;gap:6px}
.task-item{background:rgba(26,26,30,.8);backdrop-filter:blur(10px);border:.5px solid var(--sep);border-radius:10px;padding:12px 14px;transition:all .2s;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:rgba(204,120,92,.15);user-select:none;display:block;appearance:none;-webkit-appearance:none}
.task-item:hover{border-color:var(--sep2);transform:translateY(-1px);box-shadow:var(--sh)}
.task-item:active{background:rgba(204,120,92,.1);transform:scale(.98)}
.task-item.corr{border-left:3px solid var(--or)}
.task-item.done{opacity:.55}
.task-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.task-title{font-size:13px;font-weight:600;flex:1}
.task-meta{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap;font-size:11px;color:var(--tx2)}
.proj-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:2px 7px;border-radius:10px;background:var(--sur2)}
/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap}
.badge::before{content:'';width:4px;height:4px;border-radius:50%;flex-shrink:0}
.b-new{background:var(--sur3);color:var(--tx2)}.b-new::before{background:var(--tx2)}
.b-progress{background:var(--bld);color:var(--bl)}.b-progress::before{background:var(--bl)}
.b-submitted{background:var(--grd);color:var(--gr)}.b-submitted::before{background:var(--gr);animation:blink 1.5s infinite}
.b-corrections{background:var(--ord);color:var(--or)}.b-corrections::before{background:var(--or)}
.b-approved{background:var(--prd);color:var(--pr)}.b-approved::before{background:var(--pr)}
.role-e{background:var(--bld);color:var(--bl)}.role-c{background:var(--grd);color:var(--gr)}.role-a{background:var(--ted);color:var(--te)}
/* DETAIL PANEL */
.dp{width:320px;flex-shrink:0;background:rgba(20,20,24,.95);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-left:.5px solid var(--sep);display:flex;flex-direction:column;overflow:hidden}
.dp-top{padding:14px 16px;border-bottom:.5px solid var(--sep);display:flex;align-items:center;justify-content:space-between;gap:8px}
.dp-body{padding:14px 16px;flex:1;overflow-y:auto}
.dp-sec{margin-bottom:14px}
.dp-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);margin-bottom:6px}
.dp-foot{padding:12px 16px;border-top:.5px solid var(--sep);display:flex;flex-direction:column;gap:6px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:7px 14px;font-size:13px;font-weight:600;font-family:inherit;border-radius:8px;border:none;cursor:pointer;transition:all .16s;white-space:nowrap;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none}
.btn:active{transform:scale(.94)}.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-pr{background:var(--pr);color:#fff;box-shadow:0 2px 10px rgba(204,120,92,.35)}.btn-pr:hover{background:var(--prl)}
.btn-gr{background:var(--gr);color:#fff;box-shadow:0 2px 10px rgba(52,199,89,.3)}.btn-gr:hover{filter:brightness(1.1)}
.btn-or{background:var(--ord);color:var(--or);border:.5px solid rgba(255,149,0,.25)}.btn-or:hover{background:rgba(255,149,0,.2)}
.btn-rd{background:var(--rdd);color:var(--rd);border:.5px solid rgba(255,69,58,.2)}.btn-rd:hover{background:rgba(255,69,58,.18)}
.btn-gh{background:transparent;color:var(--tx2);border:.5px solid var(--sep2)}.btn-gh:hover{background:var(--sur2);color:var(--tx)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}.btn-xs{padding:3px 8px;font-size:11px;border-radius:5px}.btn-full{width:100%}
/* FORMS */
.fg{margin-bottom:12px}.flbl{font-size:11px;color:var(--tx2);margin-bottom:5px;display:block;font-weight:600;letter-spacing:.02em;text-transform:uppercase}
input[type=text],input[type=password],input[type=url],input[type=datetime-local],select,textarea{width:100%;background:var(--sur2);border:.5px solid var(--sep2);border-radius:8px;color:var(--tx);padding:8px 11px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--pr);box-shadow:0 0 0 3px var(--prd)}
select option{background:var(--sur)}textarea{min-height:72px;resize:vertical}
input[type=file]{display:block;width:100%;padding:10px;background:var(--sur2);border:.5px solid var(--sep2);border-radius:8px;color:var(--tx);cursor:pointer;font-size:13px;font-family:inherit}
.upload-zone{border:1.5px dashed var(--sep2);border-radius:10px;background:var(--sur2);padding:20px;text-align:center;transition:all .2s}
.upload-zone.drag{border-color:var(--pr);background:var(--prd)}
.prog-wrap{background:var(--sur3);border-radius:3px;height:3px;overflow:hidden;margin-top:8px;display:none}
.prog-bar{height:100%;border-radius:3px;width:0;background:linear-gradient(90deg,var(--pr),var(--te));transition:width .3s}
/* MODAL */
.overlay{position:fixed;inset:0;z-index:400;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.7);backdrop-filter:blur(10px);animation:fadeUp .2s both;-webkit-overflow-scrolling:touch;touch-action:manipulation;overflow-y:auto}
.modal{background:var(--sur);border:.5px solid var(--sep2);border-radius:16px;padding:22px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:var(--sh3);animation:springIn .28s ease both;-webkit-overflow-scrolling:touch;position:relative}
.modal-lg{max-width:640px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.modal-x{background:none;border:none;color:var(--tx2);cursor:pointer;font-size:18px;padding:6px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center}
.modal-x:hover{color:var(--tx)}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.sep-line{height:.5px;background:var(--sep2);margin:14px 0}
.err-msg{font-size:12px;color:var(--rd);margin-bottom:8px;font-weight:500;display:none}
/* COLORS */
.colors{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px}
.c-opt{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.c-opt.sel,.c-opt:hover{transform:scale(1.2);border-color:var(--tx)}
/* LINK */
.link-chip{display:inline-flex;align-items:center;gap:5px;background:var(--bld);border:.5px solid rgba(10,132,255,.2);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--bl)}
.link-chip span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.link-chip button{background:none;border:none;color:var(--bl);cursor:pointer;font-size:12px;opacity:.7}
.link-chip button:hover{opacity:1}
/* DEADLINE */
.dl-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 7px;border-radius:6px;background:var(--ord);color:var(--or);border:.5px solid rgba(255,149,0,.25)}
.dl-badge.over{background:var(--rdd);color:var(--rd);border-color:rgba(255,69,58,.25)}
/* AVATAR */
.uav{border-radius:50%;object-fit:cover;display:inline-flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
/* SECTION HDR */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.pg-title{font-size:20px;font-weight:700;letter-spacing:-.04em}
.pg-sub{font-size:13px;color:var(--tx2);margin-top:3px}
.proj-sep{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);margin:18px 0 8px;display:flex;align-items:center;gap:8px}
.proj-sep::after{content:'';flex:1;height:.5px;background:var(--sep)}
/* ANALYTICS */
.chart-card{background:rgba(28,28,32,.8);backdrop-filter:blur(12px);border:.5px solid var(--sep);border-radius:12px;padding:16px;margin-bottom:12px}
.chart-ttl{font-size:13px;font-weight:700;margin-bottom:12px}
.an-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mbar-wrap{flex:1;background:var(--sur3);border-radius:3px;height:5px;overflow:hidden}
.mbar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--pr),var(--te));transition:width .8s}
/* TABLE */
.tbl-wrap{background:var(--sur);border:.5px solid var(--sep2);border-radius:12px;overflow:hidden;margin-bottom:12px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--tx2);padding:9px 14px;text-align:left;border-bottom:.5px solid var(--sep2);background:var(--sur2)}
.tbl td{padding:9px 14px;border-bottom:.5px solid var(--sep);font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:var(--sur2)}
/* EMPTY */
.empty{text-align:center;padding:50px 24px;color:var(--tx2)}
.empty-ic{font-size:40px;margin-bottom:12px;display:block}
.empty-ttl{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:4px}
/* LOGIN */
.login-wrap{height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px}
.login-card{background:var(--sur);border:.5px solid var(--sep2);border-radius:18px;padding:30px 26px;width:100%;max-width:330px;box-shadow:var(--sh3);animation:springIn .4s ease both}
.login-ic{width:56px;height:56px;background:linear-gradient(135deg,var(--pr),var(--te));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 16px;box-shadow:0 6px 22px rgba(204,120,92,.45)}
/* LOADING */
.full-load{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.load-logo{width:64px;height:64px;background:linear-gradient(135deg,var(--pr),var(--te));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 8px 30px rgba(204,120,92,.45);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.load-dots{display:flex;gap:5px}
.load-dots span{width:5px;height:5px;border-radius:50%;background:var(--tx3);animation:dotB .9s ease infinite}
.load-dots span:nth-child(2){animation-delay:.15s}.load-dots span:nth-child(3){animation-delay:.3s}
@keyframes dotB{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
code{background:var(--sur2);padding:2px 6px;border-radius:5px;font-size:11px;font-family:monospace}
/* NOTICE */
.notice-ok{display:flex;align-items:center;gap:8px;background:var(--grd);border:.5px solid rgba(52,199,89,.25);border-radius:8px;padding:8px 12px;font-size:13px;font-weight:500;color:var(--gr);margin-bottom:12px}
.notice-warn{background:var(--ord);border:.5px solid rgba(255,149,0,.25);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--or);margin-bottom:12px;display:flex;align-items:center;gap:8px}
/* PRAVKA */
.prav-img{max-width:100%;border-radius:8px;margin-top:6px;cursor:pointer}
/* POWERED */
.powered{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--tx3);z-index:10;pointer-events:none;white-space:nowrap}
/* BIG AVATAR */
.big-av{width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid var(--sep2)}
.prof-pic-wrap{position:relative;display:inline-block}
.prof-pic-wrap input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;border-radius:50%}
/* CHAT */
.chat-fab{position:fixed;bottom:24px;right:24px;z-index:500;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--pr),var(--te));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 20px rgba(204,120,92,.5);transition:transform .25s ease,box-shadow .2s}
.chat-fab:hover{transform:scale(1.1)}.chat-fab:active{transform:scale(.94)}
.chat-panel{position:fixed;bottom:88px;right:24px;z-index:499;width:340px;height:520px;background:var(--sur);backdrop-filter:blur(24px);border:.5px solid var(--sep2);border-radius:18px;box-shadow:var(--sh3);display:flex;flex-direction:column;animation:springIn .3s ease both;overflow:hidden}
.chat-hdr{padding:12px 14px;border-bottom:.5px solid var(--sep);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--sur2)}
.chat-ttl{font-size:14px;font-weight:700;flex:1}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.msg{display:flex;gap:7px;align-items:flex-end}
.msg.mine{flex-direction:row-reverse}
.msg-bubble{background:var(--sur2);border:.5px solid var(--sep);border-radius:14px;border-bottom-left-radius:4px;padding:7px 10px;max-width:220px;font-size:13px;line-height:1.45}
.msg.mine .msg-bubble{background:var(--pr);color:#fff;border-radius:14px;border-bottom-right-radius:4px;border-color:transparent}
.msg-name{font-size:10px;font-weight:600;color:var(--tx2);margin-bottom:3px}
.msg-time{font-size:10px;color:var(--tx3);flex-shrink:0;margin-bottom:2px}
.msg-img{max-width:180px;border-radius:10px;margin-top:4px;cursor:pointer}
.msg-audio{margin-top:4px;width:180px}

// ══ CLOUD ══
async function cloudLoad(){
  syncSt='syncing';
  try{
    const url='https://baznohstrdvqgqvjmgki.supabase.co/storage/v1/object/public/kz-files/kz_data.json?t='+Date.now();
    const res=await fetch(url,{cache:'no-store'});

      const j=await res.json();
      users=(j.users||DEF_USERS).map(u=>({pic:null,...u}));
      projects=(j.projects||DEF_PROJ).map(p=>({color:'#CC785C',...p}));
      tasks=j.tasks||[];
    }else if(res.status===400||res.status===404){
      await cloudSave({users:DEF_USERS,projects:DEF_PROJ,tasks:[]},false);
      users=DEF_USERS;projects=DEF_PROJ;tasks=[];
    }else{
      throw new Error('HTTP '+res.status);
    }
    if(!users.find(u=>u.role==='admin'))users.push(DEF_USERS[5]);
    cacheLocal();syncSt='ok';
  }catch(e){
    console.warn('cloudLoad:',e.message||e);
    loadLocal();syncSt='err';
  }
}
async function cloudSave(ov,uc=true){
  const payload=ov||{users,projects,tasks};
  try{
    const bl=new Blob([JSON.stringify(payload)],{type:'application/json'});
    const{error}=await sb.storage.from(BUCKET).upload(DATA_KEY,bl,{upsert:true,contentType:'application/json'});
    if(error)throw error;syncSt='ok';
  }catch(e){console.warn(e);syncSt='err';}
  if(uc)cacheLocal();
}
function cacheLocal(){try{localStorage.setItem('kz_c',JSON.stringify({users,projects,tasks}));}catch{}}

// ══ FILES ══
const fIcon=n=>{const e=(n||'').split('.').pop().toLowerCase();if(['mp4','mov','avi','mkv','webm'].includes(e))return'🎬';if(['mp3','wav','aac','m4a','ogg','webm'].includes(e))return'🎵';if(['jpg','jpeg','png','gif','webp'].includes(e))return'🖼️';return'📎';};
const isVid=n=>['mp4','mov','avi','mkv','webm'].includes((n||'').split('.').pop().toLowerCase());

const fsize=b=>b>1048576?(b/1048576).toFixed(1)+' MB':(b/1024).toFixed(0)+' KB';
const gpUrl=p=>sb.storage.from(BUCKET).getPublicUrl(p).data.publicUrl;

async function uploadFile(file,pid){
  const safe=Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  const path='uploads/'+safe;
  const bar=pid?document.getElementById(pid+'-bar'):null;
  const wrap=pid?document.getElementById(pid):null;
  if(wrap)wrap.style.display='block';
  isUploading=true;let fp=0;
  const t=setInterval(()=>{fp=Math.min(fp+4,82);if(bar)bar.style.width=fp+'%';},180);
  try{
    const{error}=await sb.storage.from(BUCKET).upload(path,file,{upsert:true,contentType:file.type});
    clearInterval(t);isUploading=false;
    if(error)throw error;
    if(bar){bar.style.width='100%';setTimeout(()=>{if(wrap)wrap.style.display='none';bar.style.width='0%';},700);}
    return{path,url:gpUrl(path),name:file.name,size:file.size};
  }catch(e){
    clearInterval(t);isUploading=false;
    if(bar)bar.style.width='0%';if(wrap)wrap.style.display='none';
    throw e;
  }
}

      <div style="display:flex;gap:6px;margin-bottom:6px"><input type="url" id="m-link-inp" placeholder="https://..." style="flex:1"/><button class="btn btn-gh btn-sm" type="button" onclick="addLink()">+ Qo'shish</button></div>
      <div id="links-wrap" style="display:flex;flex-wrap:wrap;gap:5px"></div>

    <div class="sep-line"></div>

      <input type="file" id="m-file" accept="video/*,audio/*,image/*" onchange="const f=this.files[0];if(f){const i=$$('m-finfo');if(i){i.style.display='block';i.innerHTML='✓ '+esc(f.name)+' ('+fsize(f.size)+')';}}"/>
      <div id="m-finfo" style="display:none;margin-top:5px;font-size:12px;color:var(--gr)"></div>
      <div id="m-prog" class="prog-wrap"><div class="prog-bar" id="m-prog-bar"></div></div>

  </div></div>`;render();

async function addTask(){
  const ttl=$$('m-ttl')?.value.trim();if(!ttl){$$('m-ttl')?.focus();return;}
  const btn=$$('add-btn');if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Saqlanmoqda...';}
  const file=$$('m-file')?.files?.[0];let matUrl=null,matName=null,matPath=null;
  if(file){
    try{const r=await uploadFile(file,'m-prog');matUrl=r.url;matName=r.name;matPath=r.path;}
    catch(e){const er=$$('m-err');if(er){er.style.display='block';er.textContent='Xatolik: '+e.message;}if(btn){btn.disabled=false;btn.textContent='Topshiriq berish';}return;}
  }
  const dlVal=$$('m-deadline')?.value;
  tasks.push({id:'t'+Date.now(),projectId:$$('m-prj').value,assignedTo:$$('m-ed').value,
    title:ttl,scenario:$$('m-scenario')?.value.trim()||null,links:[..._taskLinks],
    deadline:dlVal?new Date(dlVal).getTime():null,
    status:'new',corrections:'',corrChecker:null,corrFiles:[],
    matUrl,matName,matPath,subUrl:null,subName:null,subPath:null,subFiles:[],
    createdAt:Date.now()});
  await cloudSave();modalFn=null;showNotice('Topshiriq muvaffaqiyatli berildi ✓');
}

  _taskLinks=[...(t.links||[])];
  const eopts=users.filter(u=>u.role==='editor').map(u=>`<option value="${u.id}" ${t.assignedTo===u.id?'selected':''}>${esc(u.name)}</option>`).join('');
  const popts=projects.map(p=>`<option value="${p.id}" ${t.projectId===p.id?'selected':''}>${esc(p.name)}</option>`).join('');
  const dlStr=t.deadline?new Date(t.deadline).toISOString().slice(0,16):'';
  modalFn=()=>`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal modal-lg" onclick="event.stopPropagation()">
    <div class="modal-title">Topshiriqni tahrirlash <button class="modal-x" onclick="closeModal()">✕</button></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="fg"><label class="flbl">Montajer</label><select id="m-ed">${eopts}</select></div>
      <div class="fg"><label class="flbl">Proyekt</label><select id="m-prj">${popts}</select></div>
    </div>
    <div class="fg"><label class="flbl">Nomi</label><input type="text" id="m-ttl" value="${esc(t.title)}"/></div>
    <div class="fg"><label class="flbl">Ssenariy</label><textarea id="m-scenario">${esc(t.scenario||'')}</textarea></div>
    <div class="fg"><label class="flbl">Deadline</label><input type="datetime-local" id="m-deadline" value="${dlStr}"/></div>
    <div class="fg">
      <label class="flbl">Havolalar</label>
      <div style="display:flex;gap:6px;margin-bottom:6px"><input type="url" id="m-link-inp" placeholder="https://..." style="flex:1"/><button class="btn btn-gh btn-sm" type="button" onclick="addLink()">+ Qo'shish</button></div>
      <div id="links-wrap" style="display:flex;flex-wrap:wrap;gap:5px">${renderLinks()}</div>
    </div>
    <div class="fg"><label class="flbl">Material faylini almashtirish</label>
      ${t.matUrl?`<div style="font-size:12px;color:var(--tx2);margin-bottom:5px">Hozirgi: ${esc(t.matName||'fayl')}</div>`:''}
      <input type="file" id="m-file" accept="video/*,audio/*,image/*" onchange="const f=this.files[0];if(f){const i=$$('m-finfo');if(i){i.style.display='block';i.innerHTML='✓ '+esc(f.name);}}"/>
      <div id="m-finfo" style="display:none;margin-top:5px;font-size:12px;color:var(--gr)"></div>
      <div id="m-prog" class="prog-wrap"><div class="prog-bar" id="m-prog-bar"></div></div>
    </div>
    <div id="m-err" class="err-msg"></div>
    <div class="modal-foot"><button class="btn btn-gh" onclick="closeModal()">Bekor</button><button class="btn btn-pr" id="edit-btn" onclick="saveEditTask('${id}')">Saqlash</button></div>
  </div></div>`;render();
}

async function saveEditTask(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const ttl=$$('m-ttl')?.value.trim();if(!ttl)return;
  const btn=$$('edit-btn');if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';}
  const file=$$('m-file')?.files?.[0];
  if(file){
    try{if(t.matPath)await delFile(t.matPath);const r=await uploadFile(file,'m-prog');t.matUrl=r.url;t.matName=r.name;t.matPath=r.path;}
    catch(e){const er=$$('m-err');if(er){er.style.display='block';er.textContent='Xatolik: '+e.message;}if(btn){btn.disabled=false;btn.textContent='Saqlash';}return;}
  }
  t.title=ttl;t.scenario=$$('m-scenario')?.value.trim()||null;
  t.projectId=$$('m-prj').value;t.assignedTo=$$('m-ed').value;
  t.links=[..._taskLinks];
  const dlVal=$$('m-deadline')?.value;t.deadline=dlVal?new Date(dlVal).getTime():null;
  await cloudSave();modalFn=null;showNotice('Topshiriq yangilandi ✓');
}

// ══ SUBMIT WORK ══
function openSubmit(id){
  window._pFiles=window._pFiles||[];

  function renderFileList(){
    const fl=window._pFiles||[];
    return fl.length?fl.map((f,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--sur2);border:.5px solid var(--sep);border-radius:8px;margin-top:6px">
      <span style="font-size:18px">${fIcon(f.name)}</span>

    <div class="modal-title">${t.status==='corrections'?"To\'g\'irlangan video":"Tayyor videoni yuborish"} <button class="modal-x" onclick="closeModal()">✕</button></div>
    ${t.corrections?`<div style="background:var(--ord);border-radius:8px;padding:8px 10px;font-size:12px;margin-bottom:12px;color:var(--or)">${esc(t.corrections)}</div>`:''}
    <div class="fg">
      <label class="flbl">Fayllar</label>
      <div id="pf-list">${renderFileList()}</div>
      <button type="button" onclick="document.getElementById('pf-inp').click()" class="btn btn-gh btn-full" style="margin-top:8px;touch-action:manipulation">
        + Fayl qo\'shish (video, audio, rasm)
      </button>
      <input type="file" id="pf-inp" accept="video/*,audio/*,image/*" multiple style="display:none" onchange="pfAdd(this)"/>
      <div style="font-size:11px;color:var(--tx2);margin-top:5px;text-align:center">Bir nechta tanlash uchun Ctrl ni bosib tanlang</div>
    </div>
    <div id="s-err" class="err-msg"></div>
    <div id="s-prog" class="prog-wrap"><div class="prog-bar" id="s-prog-bar"></div></div>
    <div class="modal-foot">
      <button class="btn btn-gh" onclick="closeModal()">Bekor</button>
      <button class="btn btn-gr" id="sub-btn" onclick="submitWork('${id}')">${window._pFiles&&window._pFiles.length?`↑ ${window._pFiles.length} ta fayl yuborish`:'↑ Yuborish'}</button>
    </div>
  </div></div>`;
  render();
}

function pfAdd(input){
  if(!window._pFiles)window._pFiles=[];
  Array.from(input.files||[]).forEach(f=>window._pFiles.push(f));
  input.value='';
  pfRefresh();
}
function pfRemove(i){
  if(window._pFiles)window._pFiles.splice(i,1);
  pfRefresh();
}
function pfRefresh(){
  const fl=window._pFiles||[];
  const list=document.getElementById('pf-list');
  const btn=document.getElementById('sub-btn');
  if(list){
    list.innerHTML=fl.length?fl.map((f,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--sur2);border:.5px solid var(--sep);border-radius:8px;margin-top:6px">
      <span style="font-size:18px">${fIcon(f.name)}</span>
      <span style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</span>
      <span style="font-size:11px;color:var(--tx2);flex-shrink:0">${fsize(f.size)}</span>
      <button onclick="pfRemove(${i});event.stopPropagation()" style="background:none;border:none;cursor:pointer;color:var(--rd);font-size:18px;padding:0 2px;line-height:1;flex-shrink:0;touch-action:manipulation">✕</button>
    </div>`).join(''):'<div style="font-size:12px;color:var(--tx2);text-align:center;padding:8px">Hali fayl qo\'shilmagan</div>';
  }
  if(btn){btn.textContent=fl.length?`↑ ${fl.length} ta fayl yuborish`:'↑ Yuborish';}
}


async function submitWork(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const files=Array.from(window._pFiles||[]);
  if(!files.length&&!t.subUrl){alert('Iltimos kamida bitta fayl qo\'shing');return;}
  const btn=document.getElementById('sub-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Yuklanmoqda...';}
  if(files.length){
    if(t.subPath)await delFile(t.subPath);
    for(const sf of(t.subFiles||[]))await delFile(sf.path);
    t.subFiles=[];t.subUrl=null;t.subName=null;t.subPath=null;
    for(let i=0;i<files.length;i++){
      if(btn)btn.innerHTML=`<span class="spinner"></span> ${i+1}/${files.length} yuklanmoqda...`;
      try{
        const r=await uploadFile(files[i],'s-prog');
        t.subFiles.push({url:r.url,name:r.name,path:r.path});
        if(i===0){t.subUrl=r.url;t.subName=r.name;t.subPath=r.path;}
      }catch(e){
        const er=document.getElementById('s-err');
        if(er){er.style.display='block';er.textContent='Xatolik: '+e.message;}
        if(btn){btn.disabled=false;btn.textContent='Yuborish';}return;
      }
    }
  }
  window._pFiles=[];
  t.status='submitted';
  await cloudSave();modalFn=null;showNotice('Video tekshirishga yuborildi ✓');
}

async function saveCorrect(id){
  const t=tasks.find(x=>x.id===id);const cor=$$('m-cor')?.value.trim();
  if(!cor){$$('m-cor')?.focus();return;}
  const btn=$$('corr-btn');if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';}
  const file=$$('corr-file')?.files?.[0];let corrFiles=[];
  if(file){try{const r=await uploadFile(file,'corr-prog');corrFiles=[{url:r.url,name:r.name,path:r.path}];}catch(e){console.warn(e);}}
  if(t){t.status='corrections';t.corrections=cor;t.corrChecker=cu.id;t.corrFiles=corrFiles;}
  await cloudSave();modalFn=null;showNotice('Pravkalar yuborildi');
}

// ══ TASK ACTIONS ══
async function approveT(id){const t=tasks.find(x=>x.id===id);if(t){t.status='approved';}await cloudSave();showNotice('Video tasdiqlandi ✓');if(window.innerWidth>768)render();}
async function doStart(id){const t=tasks.find(x=>x.id===id);if(t)t.status='in_progress';await cloudSave();if(window.innerWidth>768)render();}
async function delT(id){
  if(!confirm('Bu topshiriqni o\'chirishni tasdiqlaysizmi?'))return;
  const t=tasks.find(x=>x.id===id);
  if(t){await delFile(t.matPath);await delFile(t.subPath);for(const f of(t.subFiles||[]))await delFile(f.path);for(const f of(t.corrFiles||[]))await delFile(f.path);}
  tasks=tasks.filter(x=>x.id!==id);selectedTask=null;await cloudSave();render();
}
async function setTaskStatus(id,status){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  if(!confirm('Statusni o\'zgartirish?'))return;
  t.status=status;if(status==='approved')t.corrections='';
  await cloudSave();showNotice('Status yangilandi ✓');
}

// ══ ANALYTICS ══
function analyticsPageHTML(){
  const TZ=5*3600*1000,now=Date.now();
  const todayS=Math.floor((now+TZ)/86400000)*86400000-TZ;
  const weekS=todayS-6*86400000,monthS=todayS-29*86400000;
  const pS=analyticsPeriod==='day'?todayS:analyticsPeriod==='week'?weekS:analyticsPeriod==='month'?monthS:0;
  const pL=analyticsPeriod==='day'?'Bugun':analyticsPeriod==='week'?'Bu hafta':analyticsPeriod==='month'?'Bu oy':'Barchasi';
  const apAll=tasks.filter(t=>t.status==='approved');
  const apP=apAll.filter(t=>t.createdAt>=pS);
  const editors=users.filter(u=>u.role==='editor');
  const maxBar=Math.max(1,...editors.map(e=>tasks.filter(t=>t.assignedTo===e.id&&t.status==='approved'&&t.createdAt>=pS).length));
  const edRows=editors.map(e=>{
    const done=tasks.filter(t=>t.assignedTo===e.id&&t.status==='approved'&&t.createdAt>=pS).length;
    const total=tasks.filter(t=>t.assignedTo===e.id&&t.createdAt>=pS).length;
    const active=tasks.filter(t=>t.assignedTo===e.id&&['new','in_progress','corrections'].includes(t.status)).length;
    const todayDone=tasks.filter(t=>t.assignedTo===e.id&&t.status==='approved'&&t.createdAt>=todayS).length;
    const todaySub=tasks.filter(t=>t.assignedTo===e.id&&t.status==='submitted'&&t.createdAt>=todayS).length;
    const isG=todayDone>0||todaySub>0,isR=!isG&&active>0;
    const sc=isG?'var(--gr)':isR?'var(--rd)':'var(--tx2)';
    const sb2=isG?'var(--grd)':isR?'var(--rdd)':'var(--sur3)';
    const si=isG?'✓':isR?'!':'—';
    const bp=maxBar>0?Math.round(done/maxBar*100):0;
    return`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid var(--sep)">
      <div style="display:flex;align-items:center;gap:10px;width:140px;flex-shrink:0">${avatarHTML(e.id,30)}<div><div style="font-size:13px;font-weight:600">${esc(e.name)}</div><div style="font-size:11px;color:var(--tx2)">${done} tayyor</div></div></div>
      <div style="flex:1"><div class="mbar-wrap"><div class="mbar" style="width:${bp}%"></div></div><div style="font-size:11px;color:var(--tx2);margin-top:3px">Jami: ${total} · Tayyor: ${done} · Jarayonda: ${active}</div></div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0"><div style="font-size:18px;font-weight:700;color:${sc}">${done}</div><div style="width:26px;height:26px;border-radius:50%;background:${sb2};color:${sc};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700">${si}</div></div>
    </div>`;
  }).join('');
  const days=[],dL=[];
  for(let i=6;i>=0;i--){const ds=todayS-i*86400000;const de=ds+86400000;days.push(tasks.filter(t=>t.status==='approved'&&t.createdAt>=ds&&t.createdAt<de).length);const d=new Date(ds+TZ);dL.push(d.toLocaleDateString('ru',{day:'2-digit',month:'2-digit'}));}
  const stC=['new','in_progress','submitted','corrections','approved'].map(s=>tasks.filter(t=>t.status===s).length);
  return`<div class="page-in">
  <div class="sec-hdr">
    <div><div class="pg-title">Statistika</div><div class="pg-sub">Video ishlab chiqarish</div></div>
    <div class="seg">${[['all','Barchasi'],['month','Oy'],['week','Hafta'],['day','Bugun']].map(([k,l])=>`<button class="seg-b ${analyticsPeriod===k?'on':''}" onclick="analyticsPeriod='${k}';render()">${l}</button>`).join('')}</div>
  </div>
  <div class="stats-row" style="margin-bottom:16px">
    <div class="stat-card"><div class="stat-n">${apAll.length}</div><div class="stat-l">Jami tayyor</div></div>
    <div class="stat-card"><div class="stat-n" style="color:var(--pr)">${apP.length}</div><div class="stat-l">${pL}</div></div>
    <div class="stat-card"><div class="stat-n" style="color:var(--gr)">${editors.filter(e=>tasks.filter(t=>t.assignedTo===e.id&&t.createdAt>=todayS&&['approved','submitted'].includes(t.status)).length>0).length}</div><div class="stat-l">Bugun faol</div></div>
    <div class="stat-card"><div class="stat-n" style="color:var(--or)">${tasks.filter(t=>['new','in_progress','corrections'].includes(t.status)).length}</div><div class="stat-l">Jarayonda</div></div>
  </div>
  <div class="an-grid" style="margin-bottom:12px">
    <div class="chart-card"><div class="chart-ttl">So'nggi 7 kun</div><canvas id="wchart" height="160"></canvas></div>
    <div class="chart-card"><div class="chart-ttl">Status taqsimoti</div><canvas id="pchart" height="160"></canvas></div>
  </div>
  <div class="chart-card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div class="chart-ttl" style="margin-bottom:0">Montajerlar — ${pL}</div>
      <div style="display:flex;gap:12px;font-size:11px"><span style="color:var(--gr)">● Faol</span><span style="color:var(--rd)">● Kutilmoqda</span><span style="color:var(--tx3)">● Topshiriq yo'q</span></div>
    </div>
    ${edRows||'<div style="padding:20px;text-align:center;color:var(--tx2);font-size:13px">Montajerlar yo\'q</div>'}
  </div>
  </div>
  <scr`+`ipt>(function(){
    const wc=document.getElementById('wchart'),pc=document.getElementById('pchart');if(!wc||!pc||typeof Chart==='undefined')return;
    const dk=document.documentElement.getAttribute('data-theme')==='dark';
    const tc=dk?'rgba(245,245,247,.55)':'rgba(26,26,30,.5)',gc=dk?'rgba(245,245,247,.07)':'rgba(26,26,30,.07)';
    Chart.defaults.color=tc;Chart.defaults.borderColor=gc;Chart.defaults.font.family='-apple-system,Inter,system-ui,sans-serif';
    new Chart(wc,{type:'bar',data:{labels:${str(dL)},datasets:[{data:${str(days)},backgroundColor:'rgba(204,120,92,.55)',borderColor:'#CC785C',borderWidth:1.5,borderRadius:5}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{beginAtZero:true,ticks:{stepSize:1}}}}});
    new Chart(pc,{type:'doughnut',data:{labels:['Yangi','Jarayonda','Tekshirishda','Pravkada','Tayyor'],datasets:[{data:${str(stC)},backgroundColor:['#3a3a3c','#0A84FF','#30d158','#FF9500','#CC785C'],borderWidth:0,hoverOffset:5}]},options:{responsive:true,cutout:'65%',plugins:{legend:{position:'right',labels:{boxWidth:10,padding:12,font:{size:11}}}}}});
  })();</scr`+`ipt>`;
}

}

function colorPicker(sc){return`<div class="colors">${P_COLORS.map(c=>`<div class="c-opt ${c===sc?'sel':''}" style="background:${c}" onclick="selC('${c}',this)"></div>`).join('')}</div>`;}
function selC(c,el){_selColor=c;document.querySelectorAll('.c-opt').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');}
function openAddProj(){_selColor='#CC785C';modalFn=()=>`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-title">Yangi proyekt <button class="modal-x" onclick="closeModal()">✕</button></div><div class="fg"><label class="flbl">Nom</label><input type="text" id="pj-n" placeholder="Proyekt nomi"/></div><div class="fg"><label class="flbl">Rang</label>${colorPicker('#CC785C')}</div><div id="pj-err" class="err-msg"></div><div class="modal-foot"><button class="btn btn-gh" onclick="closeModal()">Bekor</button><button class="btn btn-pr" onclick="addProj()">Qo'shish</button></div></div></div>`;render();}
async function addProj(){const nm=$$('pj-n')?.value.trim(),er=$$('pj-err');if(!nm){if(er){er.style.display='block';er.textContent='Nom kiriting';}return;}projects.push({id:'p'+Date.now(),name:nm,color:_selColor});await cloudSave();modalFn=null;showNotice('Proyekt qo\'shildi ✓');}
function openEditProj(id){const p=projects.find(x=>x.id===id);if(!p)return;_selColor=p.color||'#CC785C';modalFn=()=>`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-title">Proyektni tahrirlash <button class="modal-x" onclick="closeModal()">✕</button></div><div class="fg"><label class="flbl">Nom</label><input type="text" id="pj-n" value="${esc(p.name)}"/></div><div class="fg"><label class="flbl">Rang</label>${colorPicker(p.color)}</div><div class="modal-foot"><button class="btn btn-gh" onclick="closeModal()">Bekor</button><button class="btn btn-pr" onclick="saveProj('${id}')">Saqlash</button></div></div></div>`;render();}
async function saveProj(id){const p=projects.find(x=>x.id===id),nm=$$('pj-n')?.value.trim();if(!nm||!p)return;p.name=nm;p.color=_selColor;await cloudSave();modalFn=null;showNotice('Proyekt yangilandi ✓');}
async function deleteProj(id){const p=projects.find(x=>x.id===id);if(!p)return;const cnt=tasks.filter(t=>t.projectId===id).length;if(!confirm(`"${p.name}" o'chirilsinmi?${cnt?' '+cnt+' ta topshiriq ham o\'chadi!':''}`))return;projects=projects.filter(x=>x.id!==id);tasks=tasks.filter(t=>t.projectId!==id);await cloudSave();render();}
function uModal(ttl,vals,action){return`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-title">${ttl} <button class="modal-x" onclick="closeModal()">✕</button></div><div class="fg"><label class="flbl">Ism</label><input type="text" id="fu-n" value="${esc(vals.name||'')}" placeholder="Ism"/></div><div class="fg"><label class="flbl">Login</label><input type="text" id="fu-u" value="${esc(vals.username||'')}" placeholder="login"/></div><div class="fg"><label class="flbl">Parol</label><input type="text" id="fu-p" value="${esc(vals.pass||'')}" placeholder="parol"/></div><div class="fg"><label class="flbl">Rol</label><select id="fu-r"><option value="editor" ${vals.role==='editor'?'selected':''}>Montajer</option><option value="checker" ${vals.role==='checker'?'selected':''}>Tekshiruvchi</option><option value="admin" ${vals.role==='admin'?'selected':''}>Admin</option></select></div><div id="fu-err" class="err-msg"></div><div class="modal-foot"><button class="btn btn-gh" onclick="closeModal()">Bekor</button><button class="btn btn-pr" onclick="${action}">Saqlash</button></div></div></div>`;}
function openAddUser(){modalFn=()=>uModal('Yangi foydalanuvchi',{},'addUser()');render();}
async function addUser(){const n=$$('fu-n')?.value.trim(),u=$$('fu-u')?.value.trim(),p=$$('fu-p')?.value.trim(),r=$$('fu-r')?.value,er=$$('fu-err');if(!n||!u||!p){if(er){er.style.display='block';er.textContent='Barcha maydonlarni to\'ldiring';}return;}if(users.find(x=>x.username===u)){if(er){er.style.display='block';er.textContent='Bu login band';}return;}users.push({id:'u'+Date.now(),name:n,username:u,pass:p,role:r,pic:null});await cloudSave();modalFn=null;showNotice('Foydalanuvchi qo\'shildi ✓');}
function openEditUser(id){const u=users.find(x=>x.id===id);if(!u)return;modalFn=()=>uModal('Tahrirlash',u,`editUser('${id}')`);render();}
async function editUser(id){const u=users.find(x=>x.id===id);if(!u)return;const n=$$('fu-n')?.value.trim(),un=$$('fu-u')?.value.trim(),p=$$('fu-p')?.value.trim(),r=$$('fu-r')?.value,er=$$('fu-err');if(!n||!un||!p){if(er){er.style.display='block';er.textContent='Barcha maydonlarni to\'ldiring';}return;}if(users.find(x=>x.username===un&&x.id!==id)){if(er){er.style.display='block';er.textContent='Bu login band';}return;}u.name=n;u.username=un;u.pass=p;u.role=r;if(cu.id===id)cu=u;await cloudSave();modalFn=null;showNotice('Foydalanuvchi yangilandi ✓');}
async function deleteUser(id){const u=users.find(x=>x.id===id);if(!u)return;if(!confirm(`${u.name}ni o'chirishni tasdiqlaysizmi?`))return;users=users.filter(x=>x.id!==id);await cloudSave();render();}

// ══ CHAT ══
async function loadChat(){
  if(!cu||!chatWith)return;
  try{
    const{data,error}=await sb.from('messages').select('*')
      .or(`and(from_id.eq.${cu.id},to_id.eq.${chatWith}),and(from_id.eq.${chatWith},to_id.eq.${cu.id})`)
      .order('created_at',{ascending:true}).limit(300);
    if(error)throw error;
    chatMessages=(data||[]).map(r=>({id:r.id,from:r.from_id,to:r.to_id,text:r.text||'',type:r.type||'text',fileUrl:r.file_url,fileName:r.file_name,ts:new Date(r.created_at).getTime()}));
  }catch(e){console.warn(e);}
}
async function sendMsg(text,fileUrl,fileName,type){
  if(!cu||!chatWith)return;
  try{await sb.from('messages').insert({from_id:cu.id,to_id:chatWith,text:text||'',type:type||'text',file_url:fileUrl||null,file_name:fileName||null});}
  catch(e){console.warn(e);}
}
function toggleChat(){
  chatOpen=!chatOpen;
  if(!chatOpen){const cp=document.querySelector('.chat-panel');if(cp)cp.remove();chatWith=null;stopChatPoll();}
  else renderChatFab();
  renderChatFab();
}
function startChatPoll(){
  if(chatPollTimer)return;
  chatPollTimer=setInterval(async()=>{
    if(!chatOpen||!chatWith)return;
    const prev=chatMessages.length;
    await loadChat();
    if(chatMessages.length>prev){const c=document.querySelector('.chat-msgs');if(c){c.innerHTML=buildMsgs();c.scrollTop=c.scrollHeight;}}
  },3000);
}
function stopChatPoll(){if(chatPollTimer){clearInterval(chatPollTimer);chatPollTimer=null;}}
function openChatWith(uid){chatWith=uid;chatMessages=[];loadChat().then(()=>{renderChatPanel();startChatPoll();});}
function backToList(){chatWith=null;chatMessages=[];stopChatPoll();renderChatPanel();}
function renderChatFab(){
  let fab=document.querySelector('.chat-fab');
  if(!fab){fab=document.createElement('button');fab.className='chat-fab';fab.onclick=toggleChat;document.body.appendChild(fab);}
  fab.innerHTML='💬';
  if(!chatOpen){const cp=document.querySelector('.chat-panel');if(cp)cp.remove();return;}
  renderChatPanel();
}
function renderChatPanel(){
  let cp=document.querySelector('.chat-panel');
  if(!cp){cp=document.createElement('div');cp.className='chat-panel';document.body.appendChild(cp);}
  if(!chatWith){
    const people=users.filter(u=>u.id!==cu.id);
    cp.innerHTML=`<div class="chat-hdr"><span style="font-size:18px">💬</span><div class="chat-ttl">Xabarlar</div><button class="ic-btn" onclick="toggleChat()" style="width:26px;height:26px">✕</button></div>
    <div class="chat-people">${people.map(p=>`<div class="chat-person" onclick="openChatWith('${p.id}')">${avatarHTML(p.id,32)}<div style="flex:1"><div style="font-size:13px;font-weight:500">${esc(p.name)}</div><div style="font-size:11px;color:var(--tx2)">${ROLES[p.role]||p.role}</div></div><span style="color:var(--tx3);font-size:14px">›</span></div>`).join('')}</div>`;
    return;
  }
  const other=users.find(u=>u.id===chatWith);
  cp.innerHTML=`<div class="chat-hdr"><button class="chat-ic-btn" onclick="backToList()" style="font-size:18px">←</button>${avatarHTML(chatWith,26)}<div class="chat-ttl">${esc(other?.name||'Chat')}</div><button class="ic-btn" onclick="toggleChat()" style="width:26px;height:26px">✕</button></div>
  <div class="chat-msgs" id="chat-msgs">${buildMsgs()}</div>
  <div id="sticker-tray" style="display:none;border-top:.5px solid var(--sep);overflow-x:auto"><div class="sticker-grid">${['😀','😂','🔥','❤️','👍','✅','🎬','🎵','⚡','🌟','💯','🎉','😎','🤔','💪','👏','🙏','😅','🤩','😤'].map(s=>`<button class="sticker-btn" onclick="sendSticker('${s}')">${s}</button>`).join('')}</div></div>
  <div class="chat-inp-bar">
    <button class="chat-ic-btn" onclick="toggleStickers()">😊</button>
    <label style="cursor:pointer"><input type="file" id="chat-img" accept="image/*" style="display:none" onchange="sendChatImg()"/><div class="chat-ic-btn">🖼️</div></label>
    <button class="chat-ic-btn ${chatRecording?'rec':''}" id="rec-btn" onclick="toggleRec()">🎙️</button>
    <input class="chat-inp" id="chat-inp" placeholder="Xabar yozing..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendTxt()}"/>
    <button class="send-btn" onclick="sendTxt()">▶</button>
  </div>`;
  const msgs=cp.querySelector('#chat-msgs');if(msgs)msgs.scrollTop=msgs.scrollHeight;
}
function buildMsgs(){
  let html='';let lastDay='';
  chatMessages.forEach(m=>{
    const d=new Date(m.ts).toLocaleDateString('ru',{day:'2-digit',month:'2-digit'});
    if(d!==lastDay){html+=`<div class="chat-day">${d}</div>`;lastDay=d;}
    const mine=m.from===cu?.id;
    const u=users.find(x=>x.id===m.from);
    const time=new Date(m.ts).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
    let content='';
    if(m.type==='text')content=`<div>${esc(m.text)}</div>`;
    else if(m.type==='image')content=`<img src="${esc(m.fileUrl)}" class="msg-img" onclick="window.open('${esc(m.fileUrl)}')"/>`;
    else if(m.type==='audio')content=`<audio controls class="msg-audio" src="${esc(m.fileUrl)}"></audio>`;
    else if(m.type==='sticker')content=`<div style="font-size:40px">${m.text}</div>`;
    html+=`<div class="msg ${mine?'mine':''}">
      ${!mine?avatarHTML(m.from,24):''}
      <div><div class="msg-name">${mine?'Men':esc(u?.name||'?')}</div><div class="msg-bubble">${content}</div></div>
      <div class="msg-time">${time}</div>
    </div>`;
  });
  return html;
}
function toggleStickers(){const t=$$('sticker-tray');if(t)t.style.display=t.style.display==='none'?'block':'none';}
async function sendSticker(s){await sendMsg(s,null,null,'sticker');chatMessages.push({id:'loc'+Date.now(),from:cu.id,text:s,type:'sticker',ts:Date.now()});renderChatPanel();}
async function sendTxt(){const inp=$$('chat-inp');const txt=inp?.value.trim();if(!txt)return;inp.value='';const m={id:'loc'+Date.now(),from:cu.id,text:txt,type:'text',ts:Date.now()};chatMessages.push(m);renderChatPanel();await sendMsg(txt,null,null,'text');}
async function sendChatImg(){const file=$$('chat-img')?.files?.[0];if(!file)return;try{const r=await uploadFile(file,null);await sendMsg('',r.url,r.name,'image');chatMessages.push({id:'loc'+Date.now(),from:cu.id,text:'',type:'image',fileUrl:r.url,fileName:r.name,ts:Date.now()});renderChatPanel();}catch(e){alert('Xatolik: '+e.message);}}
async function deleteMsg(id){if(!confirm('Xabarni o\'chirishni tasdiqlaysizmi?'))return;try{await sb.from('messages').delete().eq('id',id);}catch{}chatMessages=chatMessages.filter(m=>m.id!==id);renderChatPanel();}
async function toggleRec(){
  if(chatRecording){if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();chatRecording=false;const b=$$('rec-btn');if(b)b.classList.remove('rec');return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const chunks=[];mediaRecorder=new MediaRecorder(stream);
    mediaRecorder.ondataavailable=e=>chunks.push(e.data);
    mediaRecorder.onstop=async()=>{
      const blob=new Blob(chunks,{type:'audio/webm'});
      const file=new File([blob],'voice_'+Date.now()+'.webm',{type:'audio/webm'});
      stream.getTracks().forEach(t=>t.stop());
      try{const r=await uploadFile(file,null);await sendMsg('',r.url,r.name,'audio');chatMessages.push({id:'loc'+Date.now(),from:cu.id,text:'',type:'audio',fileUrl:r.url,ts:Date.now()});renderChatPanel();}catch{}
      chatRecording=false;const b=$$('rec-btn');if(b)b.classList.remove('rec');
    };
    mediaRecorder.start();chatRecording=true;const b=$$('rec-btn');if(b)b.classList.add('rec');
  }catch{alert('Mikrofon ruxsati berilmadi');}
}

// ══ INIT ══
async function autoMoveOverdue(){
  const TZ=5*3600*1000,now=Date.now();
  const todayS=Math.floor((now+TZ)/86400000)*86400000-TZ;
  let changed=false;
  tasks.forEach(t=>{
    if(t.deadline&&t.deadline<todayS&&!['approved','submitted'].includes(t.status)){
      const dayTime=t.deadline%86400000;t.deadline=todayS+86400000+(dayTime>0?dayTime:0);changed=true;
    }
  });
  if(changed)await cloudSave();
}

async function init(){
  const th=localStorage.getItem('kz_th')||'dark';
  document.documentElement.setAttribute('data-theme',th);
  await cloudLoad();
  await autoMoveOverdue();
  const sid=localStorage.getItem('kz_s');
  if(sid)cu=users.find(u=>u.id===sid)||null;
  render();
  setTimeout(renderChatFab,300);
  setInterval(async()=>{
    if(modalFn||isUploading)return;
    const pT=JSON.stringify(tasks),pU=JSON.stringify(users.map(u=>u.id+u.name+u.role));
    await cloudLoad();
    const nT=JSON.stringify(tasks),nU=JSON.stringify(users.map(u=>u.id+u.name+u.role));
    if(pT!==nT||pU!==nU){
      if(cu&&!modalFn){
        const f=users.find(u=>u.id===cu.id);if(f)cu=f;
        // Don't re-render if mobile detail is open
        if(!document.getElementById('mobile-detail'))render();
      }
    }else{const dot=document.querySelector('.sdot');if(dot)dot.className='sdot s-ok';}
  },5000);
}
init();
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
(function(){const el=document.createElement('div');el.className='powered';el.textContent='Powered by creatandcook';document.body.appendChild(el);})();
</script>
